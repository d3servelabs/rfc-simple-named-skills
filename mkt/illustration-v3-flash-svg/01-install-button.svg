<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" style="background-color: #FFFFFF;">
  <style>
    /* <![CDATA[ */
    @import url('https://fonts.googleapis.com/css2?family=Courier+New:wght@400;700&display=swap');

    /* Global Styles */
    text {
      font-family: 'Courier New', monospace;
      font-size: 14px;
      fill: #000000;
    }
    .header {
      font-size: 32px;
      font-weight: bold;
      text-anchor: middle;
    }
    .dimension-text {
      font-size: 12px;
      fill: #666;
    }
    .red-text {
      fill: #CC0000;
      font-weight: bold;
    }
    .accent {
      stroke: #0047AB;
      stroke-width: 2;
      fill: none;
    }
    .fill-accent {
      fill: #0047AB;
      stroke: none;
    }
    .grid-line {
      stroke: #DDDDDD;
      stroke-width: 0.5;
    }
    .border-line {
      stroke: #000000;
      stroke-width: 1;
      stroke-dasharray: 5,5;
    }
    .blueprint-line {
      stroke: #000000;
      stroke-width: 1.5;
      fill: none;
    }
    .label-box {
      fill: #FFFFFF;
      stroke: #000000;
      stroke-width: 1;
    }
    .btn-green {
      fill: #00AA00;
      stroke: #000000;
      stroke-width: 1;
    }
    .btn-text {
      fill: #FFFFFF;
      font-weight: bold;
      text-anchor: middle;
    }

    /* Animation Keyframes */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 1000; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes slideRight {
      from { transform: translateX(-50px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideLeft {
      from { transform: translateX(50px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes scaleIn {
      from { transform: scale(0); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    @keyframes pulseRed {
      0% { fill: #CC0000; }
      50% { fill: #FF0000; }
      100% { fill: #CC0000; }
    }

    /* Animation Classes */
    .animated {
      animation-fill-mode: both;
      animation-timing-function: ease-out;
    }
    .fade-in { animation-name: fadeIn; animation-duration: 0.8s; }
    .draw-line { animation-name: drawLine; animation-duration: 1.5s; stroke-dasharray: 1000; }
    .slide-right { animation-name: slideRight; animation-duration: 0.8s; }
    .slide-left { animation-name: slideLeft; animation-duration: 0.8s; }
    .scale-in { animation-name: scaleIn; animation-duration: 1s; transform-origin: center; }
    .pulse-red { animation-name: pulseRed; animation-duration: 1.5s; animation-iteration-count: infinite; }

    /* Staggered Delays */
    .delay-grid { animation-delay: 0s; }
    .delay-header { animation-delay: 0.5s; }
    .delay-left-base { animation-delay: 1s; }
    .delay-left-details { animation-delay: 1.5s; }
    .delay-right-base { animation-delay: 2s; }
    .delay-right-details { animation-delay: 2.5s; }
    .delay-right-arms { animation-delay: 3s; }
    .delay-arrow { animation-delay: 4.5s; }
    .delay-dimension-left { animation-delay: 5.5s; }
    .delay-dimension-right { animation-delay: 6s; }
    .delay-red-warning { animation-delay: 7s; }

    /* ]]> */
  </style>

  <!-- Background Grid -->
  <g class="animated fade-in delay-grid">
    <pattern id="gridPattern" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" class="grid-line" />
    </pattern>
    <rect width="1600" height="900" fill="url(#gridPattern)" />
  </g>

  <!-- Side Borders -->
  <line x1="20" y1="50" x2="20" y2="850" class="border-line animated draw-line delay-grid" />
  <line x1="1580" y1="50" x2="1580" y2="850" class="border-line animated draw-line delay-grid" />

  <!-- Header -->
  <text x="800" y="60" class="header animated fade-in delay-header">SAME INSTALL BUTTON, 10x THE BLAST RADIUS</text>

  <!-- LEFT SIDE: LAST YEAR -->
  <g transform="translate(150, 150)">
    <!-- Main Box -->
    <rect x="0" y="0" width="400" height="650" class="blueprint-line animated draw-line delay-left-base" />
    <text x="200" y="30" text-anchor="middle" font-weight="bold" font-size="20" class="animated fade-in delay-left-details">LAST YEAR</text>
    
    <!-- Chatbot Widget -->
    <g transform="translate(150, 100)" class="animated scale-in delay-left-details">
      <rect x="0" y="0" width="100" height="100" rx="10" class="blueprint-line" />
      <circle cx="50" cy="40" r="15" class="blueprint-line" />
      <rect x="35" y="65" width="30" height="5" class="blueprint-line" />
      <path d="M 50 80 Q 50 110 80 110" class="blueprint-line" />
      <rect x="75" y="105" width="60" height="20" class="label-box" />
      <text x="105" y="120" text-anchor="middle" font-size="10">GENERATE TEXT</text>
    </g>
    
    <!-- Pedestal -->
    <rect x="100" y="230" width="200" height="20" class="blueprint-line animated draw-line delay-left-details" />
    
    <!-- Install Button -->
    <g transform="translate(140, 300)" class="animated scale-in delay-left-details">
      <rect x="0" y="0" width="120" height="40" rx="5" class="btn-green" />
      <text x="60" y="25" class="btn-text">INSTALL</text>
    </g>

    <!-- Dimensions -->
    <g class="animated fade-in delay-dimension-left">
      <line x1="50" y1="400" x2="350" y2="400" class="blueprint-line" stroke-dasharray="3,3" />
      <text x="55" y="420" class="dimension-text">DIM CAPABILITY: ANSWER QUESTIONS</text>
      
      <line x1="50" y1="450" x2="350" y2="450" class="blueprint-line" stroke-dasharray="3,3" />
      <text x="55" y="470" class="dimension-text">DIM ACCESS: NONE</text>
      
      <line x1="50" y1="500" x2="350" y2="500" class="blueprint-line" stroke-dasharray="3,3" />
      <text x="55" y="520" class="dimension-text red-text">DIM WORST CASE: WRONG ANSWER</text>
    </g>
  </g>

  <!-- RIGHT SIDE: TODAY -->
  <g transform="translate(650, 150)">
    <!-- Main Box -->
    <rect x="0" y="0" width="800" height="650" class="blueprint-line animated draw-line delay-right-base" />
    <text x="400" y="30" text-anchor="middle" font-weight="bold" font-size="20" class="animated fade-in delay-right-details">TODAY</text>
    
    <!-- Large Robot Agent -->
    <g transform="translate(300, 80)" class="animated scale-in delay-right-details">
      <rect x="0" y="0" width="200" height="250" rx="15" class="blueprint-line" />
      <circle cx="100" cy="80" r="40" class="blueprint-line" />
      <circle cx="85" cy="70" r="5" class="blueprint-line" />
      <circle cx="115" cy="70" r="5" class="blueprint-line" />
      <path d="M 80 100 Q 100 120 120 100" class="blueprint-line" />
    </g>

    <!-- Server Racks -->
    <g transform="translate(50, 400)" class="animated draw-line delay-right-details">
      <rect x="0" y="0" width="700" height="100" class="blueprint-line" />
      <rect x="20" y="20" width="660" height="20" class="blueprint-line" />
      <rect x="20" y="60" width="660" height="20" class="blueprint-line" />
    </g>
    
    <!-- Eight Mechanical Arms -->
    <g class="blueprint-line animated draw-line delay-right-arms">
      <!-- Arm 1: File System -->
      <path d="M 350 200 Q 200 150 150 200" />
      <rect x="100" y="190" width="80" height="60" class="label-box" />
      <text x="140" y="225" text-anchor="middle" font-size="10">FILE SYSTEM</text>
      
      <!-- Arm 2: Database -->
      <path d="M 350 230 Q 250 250 200 300" />
      <rect x="160" y="290" width="80" height="60" class="label-box" />
      <text x="200" y="325" text-anchor="middle" font-size="10">DATABASE</text>
      
      <!-- Arm 3: CI/CD -->
      <path d="M 350 260 Q 300 350 250 400" />
      <rect x="210" y="390" width="80" height="60" class="label-box" />
      <text x="250" y="425" text-anchor="middle" font-size="10">CI/CD</text>
      
      <!-- Arm 4: API Keys -->
      <path d="M 450 200 Q 600 150 650 200" />
      <rect x="620" y="190" width="80" height="60" class="label-box" />
      <text x="660" y="225" text-anchor="middle" font-size="10">API KEYS</text>
      
      <!-- Arm 5: Kubernetes -->
      <path d="M 450 230 Q 550 250 600 300" />
      <rect x="560" y="290" width="80" height="60" class="label-box" />
      <text x="600" y="325" text-anchor="middle" font-size="10">KUBERNETES</text>
      
      <!-- Arm 6: Email -->
      <path d="M 450 260 Q 500 350 550 400" />
      <rect x="510" y="390" width="80" height="60" class="label-box" />
      <text x="550" y="425" text-anchor="middle" font-size="10">EMAIL</text>
      
      <!-- Arm 7: Shell Access -->
      <path d="M 400 330 Q 400 380 400 430" />
      <rect x="360" y="420" width="80" height="60" class="label-box" />
      <text x="400" y="455" text-anchor="middle" font-size="10">SHELL ACCESS</text>
      
      <!-- Arm 8: Payment API -->
      <path d="M 400 330 Q 400 380 400 430" transform="translate(100,0)"/>
      <rect x="460" y="420" width="80" height="60" class="label-box" />
      <text x="500" y="455" text-anchor="middle" font-size="10">PAYMENT API</text>
    </g>

    <!-- Install Button (Identical) -->
    <g transform="translate(340, 300)" class="animated scale-in delay-right-details">
      <rect x="0" y="0" width="120" height="40" rx="5" class="btn-green" />
      <text x="60" y="25" class="btn-text">INSTALL</text>
    </g>

    <!-- Dimensions -->
    <g class="animated fade-in delay-dimension-right">
      <line x1="50" y1="520" x2="750" y2="520" class="blueprint-line" stroke-dasharray="3,3" />
      <text x="55" y="540" class="dimension-text">DIM CAPABILITY: EVERYTHING</text>
      
      <line x1="50" y1="570" x2="750" y2="570" class="blueprint-line" stroke-dasharray="3,3" />
      <text x="55" y="590" class="dimension-text">DIM ACCESS: EVERYTHING</text>
      
      <line x1="50" y1="620" x2="750" y2="620" class="blueprint-line" stroke-dasharray="3,3" />
      <text x="55" y="640" class="dimension-text red-text animated pulse-red delay-red-warning">DIM WORST CASE: DATA BREACH, EXFILTRATION, SUPPLY CHAIN ATTACK</text>
    </g>
  </g>

  <!-- Cobalt Blue Arrow -->
  <g class="animated fade-in delay-arrow">
    <path d="M 550 450 L 650 450" class="accent" stroke-width="6" />
    <polygon points="650,440 670,450 650,460" class="fill-accent" />
    <text x="600" y="430" text-anchor="middle" class="accent" font-weight="bold">SAME BUTTON</text>
  </g>

</svg>