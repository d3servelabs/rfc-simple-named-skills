<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
<style><![CDATA[
@keyframes draw { to { stroke-dashoffset: 0; } }
@keyframes fade { to { opacity: 1; } }
@keyframes scaleIn { 0% { opacity: 0; transform: scale(0.5); } 100% { opacity: 1; transform: scale(1); } }
@keyframes slideIn { to { transform: translate(0,0); opacity: 1; } }
@keyframes pulse { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; } }
@keyframes moveRight { 0% { stroke-dashoffset: 1000; } 100% { stroke-dashoffset: 0; } }

.bg-grid { stroke: #EEE; stroke-width: 0.5; stroke-dasharray: 2 2; }
.blueprint-line { stroke: black; stroke-width: 1.5; fill: none; stroke-dasharray: 2000; stroke-dashoffset: 2000; animation: draw 1s ease-out forwards; }
.blue-line { stroke: #0047AB; stroke-width: 2; fill: none; stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: moveRight 1.5s ease-out forwards; }
.red-line { stroke: #CC0000; stroke-width: 2; fill: none; }
.dashed-margin { stroke: black; stroke-width: 1; stroke-dasharray: 5 5; }
text { font-family: 'Courier New', monospace; font-size: 14px; fill: black; opacity: 0; animation: fade 0.5s ease-out forwards; }
.header { font-size: 32px; font-weight: bold; text-anchor: middle; }
.label-bold { font-weight: bold; font-size: 16px; }
.dim-line { stroke: #888; stroke-width: 1; marker-start: url(#arrow-start); marker-end: url(#arrow-end); stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: draw 1s ease-out forwards; }
.dim-text { fill: #666; font-size: 12px; }
.install-btn { fill: #E6FFE6; stroke: #00AA00; stroke-width: 2; cursor: pointer; }
.install-text { fill: #00AA00; font-weight: bold; text-anchor: middle; font-size: 16px; animation: pulse 2s infinite; }
.warning-text { fill: #CC0000; font-weight: bold; }

marker#arrow-start { orient: auto; }
marker#arrow-start path { fill: #888; d: M 10 0 L 0 5 L 10 10 Z; }
marker#arrow-end { orient: auto; }
marker#arrow-end path { fill: #888; d: M 0 0 L 10 5 L 0 10 Z; }
marker#blue-arrow { orient: auto; }
marker#blue-arrow path { fill: #0047AB; d: M 0 0 L 15 7.5 L 0 15 Z; }

#background { animation-delay: 0s; }
#left_side { animation-delay: 0.5s; opacity: 0; transform: translate(-50px, 0); animation: slideIn 0.8s ease-out 0.5s forwards; }
#right_side { animation-delay: 1.5s; opacity: 0; transform: translate(50px, 0); animation: slideIn 0.8s ease-out 1.5s forwards; }
#central_arrow { animation-delay: 2.5s; }
#labels_dimensions { animation-delay: 3.5s; }
]]></style>

<defs>
<marker id="arrow-start" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="6" markerHeight="6"><path d="M 10 0 L 0 5 L 10 10 Z"/></marker>
<marker id="arrow-end" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6"><path d="M 0 0 L 10 5 L 0 10 Z"/></marker>
<marker id="blue-arrow" viewBox="0 0 15 15" refX="15" refY="7.5" markerWidth="10" markerHeight="10"><path d="M 0 0 L 15 7.5 L 0 15 Z"/></marker>
</defs>

<g id="background">
<rect width="1600" height="900" fill="white"/>
<g class="bg-grid">
<pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse"><path d="M 50 0 L 0 0 0 50" fill="none"/></pattern>
<rect width="1600" height="900" fill="url(#grid)"/>
</g>
<line x1="100" y1="0" x2="100" y2="900" class="dashed-margin"/>
<line x1="1500" y1="0" x2="1500" y2="900" class="dashed-margin"/>
<text x="800" y="60" class="header" style="animation-delay: 0.2s">SAME INSTALL BUTTON, 10x THE BLAST RADIUS</text>
</g>

<g id="left_side">
<text x="350" y="150" class="label-bold" style="animation-delay: 0.6s">LAST YEAR</text>
<rect x="300" y="170" width="100" height="100" class="blueprint-line" rx="10" style="animation-delay: 0.8s"/>
<circle cx="350" cy="220" r="25" class="blueprint-line" style="animation-delay: 1.0s"/>
<path d="M 335 210 Q 350 200 365 210" class="blueprint-line" style="animation-delay: 1.1s"/>
<line x1="330" y1="230" x2="370" y2="230" class="blueprint-line" style="animation-delay: 1.2s"/>
<rect x="310" y="280" width="80" height="20" class="blueprint-line" style="animation-delay: 1.3s"/>
<text x="350" y="295" text-anchor="middle" style="font-size: 10px; animation-delay: 1.4s">GENERATE TEXT</text>
<rect x="250" y="320" width="200" height="40" class="install-btn" rx="5" style="animation-delay: 1.5s"/>
<text x="350" y="347" class="install-text" style="animation-delay: 1.6s">INSTALL</text>
</g>

<g id="right_side">
<text x="1100" y="150" class="label-bold" style="animation-delay: 1.8s">TODAY</text>
<rect x="1000" y="170" width="200" height="300" class="blueprint-line" rx="10" style="animation-delay: 2.0s"/>
<circle cx="1100" cy="250" r="50" class="blueprint-line" style="animation-delay: 2.2s"/>
<path d="M 1070 230 Q 1100 210 1130 230" class="blueprint-line" style="animation-delay: 2.3s"/>
<line x1="1060" y1="270" x2="1140" y2="270" class="blueprint-line" style="animation-delay: 2.4s"/>
<rect x="900" y="500" width="400" height="150" class="blueprint-line" style="animation-delay: 2.5s"/>
<text x="1100" y="520" text-anchor="middle" style="font-size: 12px; animation-delay: 2.6s">SERVER RACKS</text>
<rect x="1000" y="680" width="200" height="40" class="install-btn" rx="5" style="animation-delay: 2.7s"/>
<text x="1100" y="707" class="install-text" style="animation-delay: 2.8s">INSTALL</text>

<g class="arms" style="animation-delay: 3.0s">
<path d="M 1000 250 Q 850 200 850 150" class="blueprint-line" style="animation-delay: 3.1s"/>
<text x="850" y="130" text-anchor="middle" style="animation-delay: 3.2s">FILE SYSTEM</text>
<path d="M 1000 300 Q 800 300 800 350" class="blueprint-line" style="animation-delay: 3.3s"/>
<text x="800" y="370" text-anchor="middle" style="animation-delay: 3.4s">DATABASE</text>
<path d="M 1000 350 Q 850 400 850 450" class="blueprint-line" style="animation-delay: 3.5s"/>
<text x="850" y="470" text-anchor="middle" style="animation-delay: 3.6s">CI/CD</text>
<path d="M 1200 250 Q 1350 200 1350 150" class="blueprint-line" style="animation-delay: 3.7s"/>
<text x="1350" y="130" text-anchor="middle" style="animation-delay: 3.8s">API KEYS</text>
<path d="M 1200 300 Q 1400 300 1400 350" class="blueprint-line" style="animation-delay: 3.9s"/>
<text x="1400" y="370" text-anchor="middle" style="animation-delay: 4.0s">KUBERNETES</text>
<path d="M 1200 350 Q 1350 400 1350 450" class="blueprint-line" style="animation-delay: 4.1s"/>
<text x="1350" y="470" text-anchor="middle" style="animation-delay: 4.2s">EMAIL</text>
<path d="M 1100 470 Q 1100 550 1050 580" class="blueprint-line" style="animation-delay: 4.3s"/>
<text x="1050" y="600" text-anchor="middle" style="animation-delay: 4.4s">SHELL ACCESS</text>
<path d="M 1100 470 Q 1100 550 1150 580" class="blueprint-line" style="animation-delay: 4.5s"/>
<text x="1150" y="600" text-anchor="middle" style="animation-delay: 4.6s">PAYMENT API</text>
</g>
</g>

<g id="central_arrow">
<line x1="500" y1="450" x2="850" y2="450" class="blue-line" marker-end="url(#blue-arrow)" style="animation-delay: 4.0s"/>
<text x="675" y="440" text-anchor="middle" class="label-bold" style="fill: #0047AB; animation-delay: 4.5s">SAME BUTTON</text>
</g>

<g id="labels_dimensions">
<g transform="translate(150, 400)">
<text x="0" y="20" class="dim-text" style="animation-delay: 5.0s">CAPABILITY: ANSWER QUESTIONS</text>
<line x1="-10" y1="25" x2="200" y2="25" class="dim-line" style="animation-delay: 5.2s"/>
<text x="0" y="50" class="dim-text" style="animation-delay: 5.4s">ACCESS: NONE</text>
<line x1="-10" y1="55" x2="200" y2="55" class="dim-line" style="animation-delay: 5.6s"/>
<text x="0" y="80" class="warning-text" style="animation-delay: 5.8s">WORST CASE: WRONG ANSWER</text>
<line x1="-10" y1="85" x2="200" y2="85" class="dim-line" style="animation-delay: 6.0s"/>
</g>

<g transform="translate(900, 750)">
<text x="0" y="20" class="dim-text" style="animation-delay: 6.2s">CAPABILITY: EVERYTHING</text>
<line x1="-10" y1="25" x2="400" y2="25" class="dim-line" style="animation-delay: 6.4s"/>
<text x="0" y="50" class="dim-text" style="animation-delay: 6.6s">ACCESS: EVERYTHING</text>
<line x1="-10" y1="55" x2="400" y2="55" class="dim-line" style="animation-delay: 6.8s"/>
<text x="0" y="80" class="warning-text" style="animation-delay: 7.0s">WORST CASE: DATA BREACH, EXFILTRATION,</text>
<text x="110" y="100" class="warning-text" style="animation-delay: 7.2s">SUPPLY CHAIN ATTACK</text>
<line x1="-10" y1="105" x2="400" y2="105" class="dim-line" style="animation-delay: 7.4s"/>
</g>
</g>
</svg>