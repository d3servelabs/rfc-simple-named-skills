<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 418">
    <defs>
        <style>
            @keyframes sway {
                0% { transform: rotate(-3deg); }
                100% { transform: rotate(3deg); }
            }
            .marionette {
                transform-origin: 400px -100px;
                animation: sway 6s steps(18, end) infinite alternate;
            }
            @keyframes swayObj1 {
                0% { transform: rotate(-4deg) translateY(0px); }
                50% { transform: rotate(1deg) translateY(3px); }
                100% { transform: rotate(5deg) translateY(0px); }
            }
            @keyframes swayObj2 {
                0% { transform: rotate(5deg) translateY(0px); }
                50% { transform: rotate(-1deg) translateY(2px); }
                100% { transform: rotate(-4deg) translateY(0px); }
            }
            .s1 { transform-origin: 150px 30px; animation: swayObj1 3.2s steps(10, end) infinite alternate; }
            .s2 { transform-origin: 250px 30px; animation: swayObj2 3.8s steps(12, end) infinite alternate; }
            .s3 { transform-origin: 350px 30px; animation: swayObj1 2.9s steps(9, end) infinite alternate-reverse; }
            .s4 { transform-origin: 450px 30px; animation: swayObj2 4.1s steps(13, end) infinite alternate; }
            .s5 { transform-origin: 550px 30px; animation: swayObj1 3.5s steps(11, end) infinite alternate; }
            .s6 { transform-origin: 650px 30px; animation: swayObj2 3.3s steps(10, end) infinite alternate-reverse; }

            @keyframes edgeDrop {
                0%, 5% { transform: translateY(-500px); }
                15% { transform: translateY(0px); }
                20% { transform: translateY(5px) rotate(2deg); }
                30% { transform: translateY(-2px) rotate(-1deg); }
                40% { transform: translateY(3px) rotate(1deg); }
                50% { transform: translateY(0px) rotate(-2deg); }
                60% { transform: translateY(4px) rotate(1deg); }
                70% { transform: translateY(-1px) rotate(0deg); }
                80% { transform: translateY(0px); }
                90%, 100% { transform: translateY(-500px); }
            }
            .edge { animation: edgeDrop 14s steps(20, end) infinite; }
            .e1 { transform-origin: 45px -400px; animation-delay: 0s; }
            .e2 { transform-origin: 100px -400px; animation-delay: -3.5s; }
            .e3 { transform-origin: 700px -400px; animation-delay: -7s; }
            .e4 { transform-origin: 760px -400px; animation-delay: -10.5s; }
        </style>

        <filter id="cut-outer" x="-20%" y="-20%" width="140%" height="140%">
            <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="2" result="noise"/>
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G" result="rough"/>
            <feDropShadow in="rough" dx="3" dy="5" stdDeviation="2.5" flood-color="#110d0a" flood-opacity="0.65" result="shadow"/>
            <feMerge>
                <feMergeNode in="shadow"/>
                <feMergeNode in="rough"/>
            </feMerge>
        </filter>

        <filter id="cut-inner" x="-20%" y="-20%" width="140%" height="140%">
            <feTurbulence type="fractalNoise" baseFrequency="0.06" numOctaves="2" result="noise"/>
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5" xChannelSelector="R" yChannelSelector="G" result="rough"/>
            <feDropShadow in="rough" dx="1.5" dy="2.5" stdDeviation="1.5" flood-color="#110d0a" flood-opacity="0.45" result="shadow"/>
            <feMerge>
                <feMergeNode in="shadow"/>
                <feMergeNode in="rough"/>
            </feMerge>
        </filter>

        <filter id="global-paper">
            <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" result="noise" />
            <feColorMatrix type="matrix" values="0.2 0 0 0 0  0 0.2 0 0 0  0 0.2 0 0 0  0 0 0 0.25 0" in="noise" />
        </filter>

        <clipPath id="rough-edge-clip">
            <path d="M 15,20 L 45,12 L 90,25 L 150,15 L 200,22 L 250,15 L 320,28 L 400,15 L 450,25 L 520,16 L 600,28 L 650,15 L 720,22 L 785,15
                     L 780,60 L 790,120 L 785,180 L 795,250 L 780,320 L 788,380 L 785,405
                     L 720,395 L 650,405 L 600,395 L 520,405 L 450,395 L 400,405 L 320,395 L 250,405 L 200,395 L 150,405 L 90,395 L 45,405 L 15,395
                     L 22,320 L 12,250 L 20,180 L 12,120 L 18,60 Z" />
        </clipPath>
    </defs>

    <rect width="800" height="418" fill="#251e19"/>
    
    <g filter="url(#cut-outer)">
        <rect width="800" height="418" fill="#3b322a" clip-path="url(#rough-edge-clip)"/>
    </g>

    <g class="edge e1">
        <line x1="45" y1="-400" x2="45" y2="180" stroke="#f5f0e8" stroke-width="2" stroke-dasharray="6 4" filter="url(#cut-inner)"/>
        <g transform="translate(45, 180)">
            <rect x="-25" y="-15" width="50" height="30" rx="3" fill="#87a878" filter="url(#cut-outer)"/>
            <rect x="-10" y="-22" width="20" height="10" rx="2" fill="#c4a882" filter="url(#cut-inner)"/>
            <circle cx="15" cy="-8" r="4" fill="#f5f0e8" filter="url(#cut-inner)"/>
            <circle cx="-5" cy="0" r="12" fill="#f5f0e8" filter="url(#cut-inner)"/>
            <circle cx="-5" cy="0" r="8" fill="#c4a882" filter="url(#cut-inner)"/>
        </g>
    </g>

    <g class="edge e2">
        <line x1="100" y1="-400" x2="100" y2="260" stroke="#f5f0e8" stroke-width="2" stroke-dasharray="6 4" filter="url(#cut-inner)"/>
        <g transform="translate(100, 260)">
            <path d="M-6,0 L6,0 L4,25 L-4,25 Z" fill="#87a878" filter="url(#cut-outer)"/>
            <circle cx="0" cy="-10" r="12" fill="#f5f0e8" filter="url(#cut-inner)"/>
            <path d="M-10,-10 L10,-10 M-8,-5 L8,-5 M-8,-15 L8,-15" stroke="#c4a882" stroke-width="2" filter="url(#cut-inner)"/>
        </g>
    </g>

    <g class="edge e3">
        <line x1="700" y1="-400" x2="700" y2="280" stroke="#f5f0e8" stroke-width="2" stroke-dasharray="6 4" filter="url(#cut-inner)"/>
        <g transform="translate(700, 280)">
            <path d="M-35,10 L-25,-10 L10,-10 L25,10 L35,10 L35,20 L-35,20 Z" fill="#d4a0a0" filter="url(#cut-outer)"/>
            <path d="M-20,-5 L5,-5 L15,5 L-20,5 Z" fill="#f5f0e8" filter="url(#cut-inner)"/>
            <circle cx="-20" cy="20" r="8" fill="#c4a882" filter="url(#cut-inner)"/>
            <circle cx="20" cy="20" r="8" fill="#c4a882" filter="url(#cut-inner)"/>
        </g>
    </g>

    <g class="edge e4">
        <line x1="760" y1="-400" x2="760" y2="190" stroke="#f5f0e8" stroke-width="2" stroke-dasharray="6 4" filter="url(#cut-inner)"/>
        <g transform="translate(760, 190)">
            <rect x="-20" y="-5" width="40" height="30" fill="#f5f0e8" filter="url(#cut-outer)"/>
            <polygon points="-28,-5 0,-25 28,-5" fill="#d4a0a0" filter="url(#cut-inner)"/>
            <rect x="-5" y="10" width="10" height="15" fill="#c4a882" filter="url(#cut-inner)"/>
            <rect x="-15" y="5" width="6" height="6" fill="#87a878" filter="url(#cut-inner)"/>
            <rect x="9" y="5" width="6" height="6" fill="#87a878" filter="url(#cut-inner)"/>
        </g>
    </g>

    <g class="marionette">
        <rect x="120" y="20" width="560" height="20" rx="4" fill="#c4a882" filter="url(#cut-outer)"/>
        <path d="M140,25 L660,25 M150,30 L650,30 M130,35 L670,35" stroke="#a38965" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="20 10 50 15" filter="url(#cut-inner)"/>
        
        <circle cx="150" cy="30" r="3" fill="#87a878" filter="url(#cut-inner)"/>
        <circle cx="250" cy="30" r="3" fill="#87a878" filter="url(#cut-inner)"/>
        <circle cx="350" cy="30" r="3" fill="#87a878" filter="url(#cut-inner)"/>
        <circle cx="450" cy="30" r="3" fill="#87a878" filter="url(#cut-inner)"/>
        <circle cx="550" cy="30" r="3" fill="#87a878" filter="url(#cut-inner)"/>
        <circle cx="650" cy="30" r="3" fill="#87a878" filter="url(#cut-inner)"/>

        <g class="s1">
            <line x1="150" y1="30" x2="150" y2="230" stroke="#f5f0e8" stroke-width="2" stroke-dasharray="6 4" filter="url(#cut-inner)"/>
            <g transform="translate(150, 230)">
                <rect x="-35" y="-20" width="70" height="40" rx="4" fill="#f5f0e8" filter="url(#cut-outer)"/>
                <rect x="-28" y="-15" width="56" height="26" rx="2" fill="#87a878" filter="url(#cut-inner)"/>
                <path d="M-35,22 L35,22 L42,32 L-42,32 Z" fill="#c4a882" filter="url(#cut-inner)"/>
            </g>
        </g>

        <g class="s2">
            <line x1="250" y1="30" x2="250" y2="250" stroke="#f5f0e8" stroke-width="2" stroke-dasharray="6 4" filter="url(#cut-inner)"/>
            <g transform="translate(250, 250)">
                <rect x="-25" y="-35" width="50" height="70" rx="3" fill="#c4a882" filter="url(#cut-outer)"/>
                <rect x="-15" y="-25" width="30" height="10" rx="2" fill="#87a878" filter="url(#cut-inner)"/>
                <rect x="-15" y="-5" width="30" height="10" rx="2" fill="#87a878" filter="url(#cut-inner)"/>
                <rect x="-15" y="15" width="30" height="10" rx="2" fill="#87a878" filter="url(#cut-inner)"/>
                <circle cx="-5" cy="-20" r="2" fill="#f5f0e8" filter="url(#cut-inner)"/>
                <circle cx="-5" cy="0" r="2" fill="#f5f0e8" filter="url(#cut-inner)"/>
                <circle cx="-5" cy="20" r="2" fill="#f5f0e8" filter="url(#cut-inner)"/>
            </g>
        </g>

        <g class="s3">
            <line x1="350" y1="30" x2="350" y2="220" stroke="#f5f0e8" stroke-width="2" stroke-dasharray="6 4" filter="url(#cut-inner)"/>
            <g transform="translate(350, 220)">
                <rect x="-25" y="-35" width="50" height="70" rx="2" fill="#f5f0e8" filter="url(#cut-outer)"/>
                <rect x="-15" y="-15" width="30" height="4" fill="#d4a0a0" filter="url(#cut-inner)"/>
                <rect x="-15" y="-5" width="20" height="4" fill="#d4a0a0" filter="url(#cut-inner)"/>
                <rect x="-15" y="5" width="30" height="4" fill="#d4a0a0" filter="url(#cut-inner)"/>
                <rect x="-15" y="15" width="25" height="4" fill="#d4a0a0" filter="url(#cut-inner)"/>
                <polygon points="25,-35 10,-35 25,-20" fill="#c4a882" filter="url(#cut-inner)"/>
            </g>
        </g>

        <g class="s4">
            <line x1="450" y1="30" x2="450" y2="240" stroke="#f5f0e8" stroke-width="2" stroke-dasharray="6 4" filter="url(#cut-inner)"/>
            <g transform="translate(450, 240)">
                <rect x="-35" y="-25" width="70" height="50" rx="5" fill="#c4a882" filter="url(#cut-outer)"/>
                <rect x="-15" y="-38" width="30" height="25" rx="2" fill="#87a878" filter="url(#cut-inner)"/>
                <path d="M-35,-25 L0,-5 L35,-25 Z" fill="#d4a0a0" filter="url(#cut-inner)"/>
            </g>
        </g>

        <g class="s5">
            <line x1="550" y1="30" x2="550" y2="260" stroke="#f5f0e8" stroke-width="2" stroke-dasharray="6 4" filter="url(#cut-inner)"/>
            <g transform="translate(550, 260)">
                <circle cx="0" cy="0" r="35" fill="#87a878" filter="url(#cut-outer)"/>
                <path d="M-10,-15 Q-15,-15 -15,-5 Q-15,0 -20,0 Q-15,0 -15,5 Q-15,15 -10,15" fill="none" stroke="#f5f0e8" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" filter="url(#cut-inner)"/>
                <path d="M10,-15 Q15,-15 15,-5 Q15,0 20,0 Q15,0 15,5 Q15,15 10,15" fill="none" stroke="#f5f0e8" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" filter="url(#cut-inner)"/>
            </g>
        </g>

        <g class="s6">
            <line x1="650" y1="30" x2="650" y2="230" stroke="#f5f0e8" stroke-width="2" stroke-dasharray="6 4" filter="url(#cut-inner)"/>
            <g transform="translate(650, 230)">
                <path d="M-35,-25 L35,-25 A10,10 0 0,1 45,-15 L45,15 A10,10 0 0,1 35,25 L15,25 L-5,40 L-5,25 L-35,25 A10,10 0 0,1 -45,15 L-45,-15 A10,10 0 0,1 -35,-25 Z" fill="#d4a0a0" filter="url(#cut-outer)"/>
                <circle cx="-15" cy="0" r="5" fill="#f5f0e8" filter="url(#cut-inner)"/>
                <circle cx="0" cy="0" r="5" fill="#f5f0e8" filter="url(#cut-inner)"/>
                <circle cx="15" cy="0" r="5" fill="#f5f0e8" filter="url(#cut-inner)"/>
            </g>
        </g>
    </g>

    <rect width="100%" height="100%" fill="#fff" style="pointer-events:none; mix-blend-mode: multiply;" filter="url(#global-paper)"/>
</svg>