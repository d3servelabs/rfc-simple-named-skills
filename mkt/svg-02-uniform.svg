<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 418" width="800" height="418">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&amp;display=swap');
            text {
                font-family: 'Courier Prime', monospace, sans-serif;
            }
            .bg { fill: #f8fafc; }
            
            /* Animations */
            @keyframes walkToDoor {
                0% { transform: translate(50px, 450px); }
                10% { transform: translate(275px, 225px); }
                20% { transform: translate(275px, 225px); }
                25% { transform: translate(340px, 150px); }
                30% { transform: translate(340px, 150px); }
                35% { transform: translate(275px, 225px); }
                45%, 50% { transform: translate(50px, 450px); }
                50.1% { transform: translate(50px, 450px); }
                60% { transform: translate(275px, 225px); }
                80% { transform: translate(275px, 225px); }
                90%, 100% { transform: translate(50px, 450px); }
            }
            
            @keyframes flipSprite {
                0%, 30% { transform: scaleX(1); }
                31%, 49% { transform: scaleX(-1); }
                50%, 80% { transform: scaleX(1); }
                81%, 100% { transform: scaleX(-1); }
            }

            @keyframes walkBob {
                0%, 100% { transform: translateY(0); }
                50% { transform: translateY(-3px); }
            }

            @keyframes doorSlide {
                0%, 12% { transform: translate(0, 0); }
                15%, 35% { transform: translate(-75px, -75px); }
                38%, 62% { transform: translate(0, 0); }
                65%, 78% { transform: translate(-75px, -75px); }
                80%, 100% { transform: translate(0, 0); }
            }

            @keyframes houseLoot {
                0%, 25% { opacity: 1; }
                26%, 49% { opacity: 0; }
                50%, 100% { opacity: 1; }
            }

            @keyframes guyLoot {
                0%, 25% { opacity: 0; }
                26%, 49% { opacity: 1; }
                50%, 100% { opacity: 0; }
            }

            @keyframes bellRing {
                0%, 9% { opacity: 0; transform: scale(0.5); }
                10%, 13% { opacity: 1; transform: scale(1); }
                14%, 59% { opacity: 0; transform: scale(0.5); }
                60%, 63% { opacity: 1; transform: scale(1); }
                64%, 100% { opacity: 0; transform: scale(0.5); }
            }

            @keyframes idCheck {
                0%, 67% { opacity: 0; transform: translateY(20px); }
                70%, 78% { opacity: 1; transform: translateY(0); }
                80%, 100% { opacity: 0; transform: translateY(20px); }
            }

            @keyframes crossMark {
                0%, 72% { opacity: 0; transform: scale(0); }
                74%, 78% { opacity: 1; transform: scale(1); }
                80%, 100% { opacity: 0; transform: scale(0); }
            }

            @keyframes alertPop {
                0%, 73% { opacity: 0; transform: scale(0); }
                75%, 78% { opacity: 1; transform: scale(1); }
                80%, 100% { opacity: 0; transform: scale(0); }
            }

            /* Apply Animations */
            #delivery-guy { animation: walkToDoor 20s infinite linear; }
            .sprite-flipper { animation: flipSprite 20s infinite steps(1); }
            .sprite-bob { animation: walkBob 0.4s infinite linear; }
            #door { animation: doorSlide 20s infinite cubic-bezier(0.4, 0, 0.2, 1); }
            .house-loot { animation: houseLoot 20s infinite steps(1); }
            .guy-loot { animation: guyLoot 20s infinite steps(1); }
            .bell-icon { animation: bellRing 20s infinite; transform-origin: 260px 70px; }
            .id-badge { animation: idCheck 20s infinite cubic-bezier(0.34, 1.56, 0.64, 1); }
            .cross { animation: crossMark 20s infinite cubic-bezier(0.34, 1.56, 0.64, 1); transform-origin: 400px 150px; }
            .alert { animation: alertPop 20s infinite cubic-bezier(0.34, 1.56, 0.64, 1); transform-origin: center; }
        </style>
        
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="8" stdDeviation="6" flood-opacity="0.1" />
        </filter>
    </defs>

    <rect class="bg" width="100%" height="100%" />

    <text x="400" y="40" font-size="22" font-weight="bold" fill="#1e293b" text-anchor="middle">Physical Security: Verify Service Personnel</text>
    <text x="400" y="385" font-size="14" fill="#64748b" text-anchor="middle">Anyone can buy a uniform online. Always verify credentials.</text>

    <!-- Isometric Scene Wrapper -->
    <g transform="translate(0, 120)">
        
        <!-- Environment Base -->
        <path d="M400,600 L1000,0 L400,-400 L-200,200 Z" fill="#dcfce3" />
        <path d="M225,175 L325,275 L100,500 L0,400 Z" fill="#cbd5e1" />
        
        <!-- Interior Base -->
        <path d="M325,275 L425,175 L425,-5 L325,95 Z" fill="#94a3b8" />
        <path d="M225,175 L325,75 L325,-105 L225,-5 Z" fill="#64748b" />
        <path d="M325,275 L225,175 L325,75 L425,175 Z" fill="#475569" />

        <!-- Interior Assets -->
        <g class="house-loot" transform="translate(340, 150)">
            <path d="M-20,0 L0,-20 L20,0 L0,20 Z" fill="#94a3b8" />
            <path d="M-20,0 L0,20 L0,35 L-20,15 Z" fill="#64748b" />
            <path d="M20,0 L0,20 L0,35 L20,15 Z" fill="#475569" />
            <!-- Gold Server / Box -->
            <path d="M-12,-12 L0,-24 L12,-12 L0,0 Z" fill="#fde047" />
            <path d="M-12,-12 L0,0 L0,15 L-12,3 Z" fill="#eab308" />
            <path d="M12,-12 L0,0 L0,15 L12,3 Z" fill="#ca8a04" />
        </g>

        <!-- Homeowner (Inside) -->
        <g id="homeowner" transform="translate(290, 150)" shape-rendering="crispEdges">
            <ellipse cx="0" cy="15" rx="14" ry="7" fill="rgba(0,0,0,0.3)" shape-rendering="auto"/>
            <!-- Hair -->
            <rect x="-12" y="-45" width="24" height="10" fill="#1e293b" rx="2" />
            <!-- Face -->
            <rect x="-10" y="-35" width="20" height="15" fill="#fcd34d" rx="2" />
            <!-- Eye facing left -->
            <rect x="-12" y="-30" width="4" height="4" fill="#0f172a" />
            <!-- Body -->
            <rect x="-14" y="-20" width="28" height="25" fill="#0284c7" rx="2" />
            <rect x="-4" y="-20" width="8" height="25" fill="#0369a1" />
            <!-- Legs -->
            <rect x="-10" y="5" width="8" height="15" fill="#0f172a" />
            <rect x="2" y="5" width="8" height="15" fill="#0f172a" />
        </g>

        <!-- Alert Bubble for Homeowner -->
        <g class="alert" transform="translate(290, 80)">
            <path d="M0,0 L8,-15 L-8,-15 Z" fill="#ef4444" />
            <rect x="-3" y="-28" width="6" height="12" fill="#ef4444" rx="1" />
            <rect x="-3" y="-35" width="6" height="5" fill="#ef4444" rx="1" />
        </g>

        <!-- Exterior Walls -->
        <path d="M400,350 L650,100 L650,-150 L400,100 Z" fill="#cbd5e1" />
        <path d="M400,350 L150,100 L150,-150 L400,100 Z M325,275 L325,95 L225,-5 L225,175 Z" fill="#e2e8f0" fill-rule="evenodd" />

        <!-- Door -->
        <g id="door">
            <path d="M325,275 L225,175 L225,-5 L325,95 Z" fill="#783c10" />
            <path d="M312,252 L242,182 L242,102 L312,172 Z" fill="#8b4a18" />
            <path d="M312,157 L242,87 L242,7 L312,77 Z" fill="#8b4a18" />
            <ellipse cx="242" cy="85" rx="4" ry="6" fill="#fbbf24" />
        </g>

        <!-- Delivery Guy -->
        <g id="delivery-guy">
            <g class="sprite-flipper">
                <g class="sprite-bob" shape-rendering="crispEdges">
                    <ellipse cx="0" cy="15" rx="16" ry="8" fill="rgba(0,0,0,0.3)" shape-rendering="auto"/>
                    
                    <!-- Uniform Cap -->
                    <rect x="-12" y="-55" width="24" height="12" fill="#783c10" rx="2" />
                    <rect x="0" y="-50" width="16" height="4" fill="#451a03" />
                    
                    <!-- Face -->
                    <rect x="-10" y="-43" width="20" height="15" fill="#fed7aa" rx="2" />
                    <!-- Eye -->
                    <rect x="4" y="-38" width="4" height="4" fill="#000" />
                    
                    <!-- Uniform Body -->
                    <rect x="-14" y="-28" width="28" height="28" fill="#783c10" rx="2" />
                    <rect x="-14" y="-15" width="28" height="4" fill="#fbbf24" />
                    
                    <!-- Arm -->
                    <rect x="-4" y="-23" width="12" height="18" fill="#8b4a18" rx="2" />

                    <!-- Stolen Goods Overlay -->
                    <g class="guy-loot" transform="translate(4, -10)" shape-rendering="auto">
                        <path d="M-12,-12 L0,-24 L12,-12 L0,0 Z" fill="#fde047" />
                        <path d="M-12,-12 L0,0 L0,15 L-12,3 Z" fill="#eab308" />
                        <path d="M12,-12 L0,0 L0,15 L12,3 Z" fill="#ca8a04" />
                    </g>

                    <!-- Legs -->
                    <rect x="-10" y="0" width="8" height="15" fill="#292524" />
                    <rect x="2" y="0" width="8" height="15" fill="#292524" />
                </g>
            </g>
        </g>
    </g>

    <!-- UI Overlay Elements -->
    <!-- Doorbell Notification -->
    <g class="bell-icon" transform="translate(260, 70)">
        <path d="M-30,-20 L30,-20 L30,20 L0,20 L-10,30 L-10,20 L-30,20 Z" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
        <text x="0" y="5" font-size="14" font-weight="bold" fill="#0f172a" text-anchor="middle">DING!</text>
    </g>

    <!-- Fake ID Badge Overlay -->
    <g class="id-badge" transform="translate(400, 150)" filter="url(#shadow)">
        <rect x="-90" y="-60" width="180" height="120" fill="#ffffff" stroke="#94a3b8" stroke-width="3" rx="8" />
        <path d="M-87,-60 L87,-60 A5,5 0 0,1 92,-55 L92,-30 L-92,-30 L-92,-55 A5,5 0 0,1 -87,-60 Z" fill="#ef4444" />
        <text x="0" y="-40" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">EXPRESS COURIER</text>
        
        <!-- Photo slot -->
        <rect x="-70" y="-15" width="40" height="45" fill="#e2e8f0" rx="4" />
        <circle cx="-50" cy="-2" r="8" fill="#cbd5e1" />
        <path d="M-65,25 A15,15 0 0,1 -35,25 Z" fill="#cbd5e1" />

        <!-- Fake Data Lines -->
        <rect x="-15" y="-10" width="85" height="8" fill="#1e293b" rx="2" />
        <rect x="-15" y="5" width="60" height="6" fill="#64748b" rx="2" />
        <rect x="-15" y="18" width="40" height="6" fill="#94a3b8" rx="2" />
        <rect x="-15" y="32" width="70" height="4" fill="#cbd5e1" rx="1" />
        <rect x="-15" y="40" width="50" height="4" fill="#cbd5e1" rx="1" />

        <!-- Clip Lanyard -->
        <rect x="-15" y="-75" width="30" height="15" fill="#1e293b" rx="2" />
        <path d="M0,-85 A8,8 0 0,1 0,-65" fill="none" stroke="#64748b" stroke-width="4" />
    </g>

    <!-- Denial Cross Overlay -->
    <g class="cross" transform="translate(400, 150)">
        <circle cx="0" cy="0" r="50" fill="#fee2e2" stroke="#fca5a5" stroke-width="4" />
        <path d="M-25,-25 L25,25 M-25,25 L25,-25" fill="none" stroke="#dc2626" stroke-width="12" stroke-linecap="round" />
    </g>

</svg>