<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 418" width="800" height="418">
  <defs>
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="#000000" opacity="0.4" />
      <rect y="2" width="4" height="2" fill="transparent" />
    </pattern>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <clipPath id="s1-L1-clip"><rect x="202" y="70" height="40" class="s1-L1-rect" /></clipPath>
    <clipPath id="s1-L2-clip"><rect x="202" y="110" height="40" class="s1-L2-rect" /></clipPath>
    <clipPath id="s1-L3-clip"><rect x="202" y="150" height="40" class="s1-L3-rect" /></clipPath>
    <clipPath id="s1-sweep-clip"><rect x="202" y="70" height="40" class="s1-sweep-clip-rect" /></clipPath>

    <clipPath id="s2-L1-clip"><rect x="202" y="70" height="40" class="s2-L1-rect" /></clipPath>
    <clipPath id="s2-L2-clip"><rect x="202" y="110" height="40" class="s2-L2-rect" /></clipPath>
    <clipPath id="s2-L3-clip"><rect x="202" y="150" height="40" class="s2-L3-rect" /></clipPath>
    <clipPath id="s2-sweep-clip"><rect x="202" y="70" height="40" class="s2-sweep-clip-rect" /></clipPath>
  </defs>

  <style>
    .term-text {
      font-family: 'Courier New', Courier, monospace;
      font-size: 18px;
      fill: #00ff41;
      white-space: pre;
      filter: url(#glow);
    }
    .verified-text { fill: #00ff41; font-weight: bold; }
    .rejected-text { fill: #ff0040; font-weight: bold; }
    .white-glow { fill: #ffffff; }

    .crt-flicker { animation: flicker 0.15s infinite; }
    @keyframes flicker {
      0% { opacity: 0.95; }
      50% { opacity: 0.98; }
      100% { opacity: 0.92; }
    }

    .blink { animation: blinker 0.8s step-end infinite; }
    @keyframes blinker { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    #scene1 { animation: s1-fade 20s infinite; }
    @keyframes s1-fade { 0%, 45% { opacity: 1; } 48%, 100% { opacity: 0; } }

    #scene2 { animation: s2-fade 20s infinite; opacity: 0; }
    @keyframes s2-fade { 0%, 49% { opacity: 0; } 50%, 95% { opacity: 1; } 98%, 100% { opacity: 0; } }

    .s1-line1 { animation: show-L1 20s infinite; }
    @keyframes show-L1 { 0%, 1.9% { opacity: 0; } 2%, 100% { opacity: 1; } }
    .s1-line2 { animation: show-L2 20s infinite; }
    @keyframes show-L2 { 0%, 11.9% { opacity: 0; } 12%, 100% { opacity: 1; } }
    .s1-line3 { animation: show-L3 20s infinite; }
    @keyframes show-L3 { 0%, 25.9% { opacity: 0; } 26%, 100% { opacity: 1; } }

    .s2-line1 { animation: show-s2-L1 20s infinite; }
    @keyframes show-s2-L1 { 0%, 51.9% { opacity: 0; } 52%, 100% { opacity: 1; } }
    .s2-line2 { animation: show-s2-L2 20s infinite; }
    @keyframes show-s2-L2 { 0%, 61.9% { opacity: 0; } 62%, 100% { opacity: 1; } }
    .s2-line3 { animation: show-s2-L3 20s infinite; }
    @keyframes show-s2-L3 { 0%, 75.9% { opacity: 0; } 76%, 100% { opacity: 1; } }

    .s1-c1-wrapper { animation: hide-c1 20s infinite; }
    @keyframes hide-c1 { 0%, 11.9% { opacity: 1; } 12%, 100% { opacity: 0; } }
    .s1-c2-wrapper { animation: hide-c2 20s infinite; }
    @keyframes hide-c2 { 0%, 25.9% { opacity: 1; } 26%, 100% { opacity: 0; } }
    
    .s2-c1-wrapper { animation: hide-s2-c1 20s infinite; }
    @keyframes hide-s2-c1 { 0%, 61.9% { opacity: 1; } 62%, 100% { opacity: 0; } }
    .s2-c2-wrapper { animation: hide-s2-c2 20s infinite; }
    @keyframes hide-s2-c2 { 0%, 75.9% { opacity: 1; } 76%, 100% { opacity: 0; } }

    .s1-L1-rect { animation: s1-L1 20s infinite; }
    @keyframes s1-L1 { 0%, 1.9% { width: 0; } 2% { width: 0; animation-timing-function: linear; } 10%, 100% { width: 525px; } }
    .s1-L2-rect { animation: s1-L2 20s infinite; }
    @keyframes s1-L2 { 0%, 11.9% { width: 0; } 12% { width: 0; animation-timing-function: linear; } 17%, 100% { width: 310px; } }
    .s1-L3-rect { animation: s1-L3 20s infinite; }
    @keyframes s1-L3 { 0%, 25.9% { width: 0; } 26% { width: 0; animation-timing-function: linear; } 29%, 100% { width: 155px; } }

    .s2-L1-rect { animation: s2-L1 20s infinite; }
    @keyframes s2-L1 { 0%, 51.9% { width: 0; } 52% { width: 0; animation-timing-function: linear; } 60%, 100% { width: 525px; } }
    .s2-L2-rect { animation: s2-L2 20s infinite; }
    @keyframes s2-L2 { 0%, 61.9% { width: 0; } 62% { width: 0; animation-timing-function: linear; } 67%, 100% { width: 215px; } }
    .s2-L3-rect { animation: s2-L3 20s infinite; }
    @keyframes s2-L3 { 0%, 75.9% { width: 0; } 76% { width: 0; animation-timing-function: linear; } 79%, 100% { width: 155px; } }

    .s1-c1-pos { animation: s1-c1-pos-anim 20s infinite; }
    @keyframes s1-c1-pos-anim { 0%, 1.9% { x: 202px; } 2% { x: 202px; animation-timing-function: steps(48); } 10%, 100% { x: 721px; } }
    .s1-c2-pos { animation: s1-c2-pos-anim 20s infinite; }
    @keyframes s1-c2-pos-anim { 0%, 11.9% { x: 202px; } 12% { x: 202px; animation-timing-function: steps(28); } 17%, 100% { x: 505px; } }
    .s1-c3-pos { animation: s1-c3-pos-anim 20s infinite; }
    @keyframes s1-c3-pos-anim { 0%, 25.9% { x: 202px; } 26% { x: 202px; animation-timing-function: steps(14); } 29%, 100% { x: 354px; } }

    .s2-c1-pos { animation: s2-c1-pos-anim 20s infinite; }
    @keyframes s2-c1-pos-anim { 0%, 51.9% { x: 202px; } 52% { x: 202px; animation-timing-function: steps(48); } 60%, 100% { x: 721px; } }
    .s2-c2-pos { animation: s2-c2-pos-anim 20s infinite; }
    @keyframes s2-c2-pos-anim { 0%, 61.9% { x: 202px; } 62% { x: 202px; animation-timing-function: steps(19); } 67%, 100% { x: 408px; } }
    .s2-c3-pos { animation: s2-c3-pos-anim 20s infinite; }
    @keyframes s2-c3-pos-anim { 0%, 75.9% { x: 202px; } 76% { x: 202px; animation-timing-function: steps(14); } 79%, 100% { x: 354px; } }

    .s1-sweep-clip-rect { animation: s1-sweep-clip-anim 20s infinite; }
    @keyframes s1-sweep-clip-anim { 0%, 19.9% { width: 0; } 20% { width: 0; animation-timing-function: ease-in-out; } 24%, 100% { width: 305px; } }
    .s1-sweep-box { animation: s1-sweep-box-anim 20s infinite; fill: #ffffff; }
    @keyframes s1-sweep-box-anim {
      0%, 19.9% { opacity: 0; x: 202px; width: 0px; }
      20% { opacity: 0.9; x: 202px; width: 12px; animation-timing-function: ease-in-out; }
      24% { opacity: 0.9; x: 493px; width: 12px; }
      24.1%, 100% { opacity: 0; x: 493px; width: 0px; }
    }

    .s2-sweep-clip-rect { animation: s2-sweep-clip-anim 20s infinite; }
    @keyframes s2-sweep-clip-anim { 0%, 69.9% { width: 0; } 70% { width: 0; animation-timing-function: ease-in-out; } 74%, 100% { width: 210px; } }
    .s2-sweep-box { animation: s2-sweep-box-anim 20s infinite; }
    @keyframes s2-sweep-box-anim {
      0%, 69.9% { opacity: 0; x: 202px; width: 0px; fill: #ffffff; }
      70% { opacity: 0.9; x: 202px; width: 12px; fill: #ffffff; animation-timing-function: ease-in-out; }
      73.9% { opacity: 0.9; x: 396px; width: 12px; fill: #ffffff; }
      74% { opacity: 0.9; x: 396px; width: 12px; fill: #ff0040; }
      75%, 100% { opacity: 0; x: 396px; width: 0px; fill: #ff0040; }
    }
    .s2-overlay { animation: s2-text-color 20s infinite; }
    @keyframes s2-text-color {
      0%, 73.9% { fill: #ffffff; }
      74%, 100% { fill: #ff0040; }
    }
  </style>

  <rect width="100%" height="100%" fill="#0a0a0a" />

  <g class="crt-flicker">
    <text x="40" y="40" class="term-text" fill="#008822" opacity="0.6" xml:space="preserve">=== ACME SECURE ENCLAVE VERIFIER ===</text>

    <g id="scene1">
      <g class="s1-line1">
        <text x="40" y="100" class="term-text" xml:space="preserve">&gt; TARGET     : </text>
        <text x="202" y="100" class="term-text" clip-path="url(#s1-L1-clip)" xml:space="preserve">https://github.com/acme-org/repo/skills/SKILL.md</text>
        <text x="202" y="100" class="term-text white-glow" clip-path="url(#s1-sweep-clip)" xml:space="preserve">https://github.com/acme-org/</text>
        <g class="s1-c1-wrapper"><g class="blink"><rect y="86" width="10" height="18" fill="#00ff41" class="s1-c1-pos" filter="url(#glow)"/></g></g>
      </g>
      
      <rect y="86" height="18" class="s1-sweep-box" filter="url(#glow)"/>

      <g class="s1-line2">
        <text x="40" y="140" class="term-text" xml:space="preserve">&gt; TRUST ROOT : </text>
        <text x="202" y="140" class="term-text" clip-path="url(#s1-L2-clip)" xml:space="preserve">https://github.com/acme-org/</text>
        <g class="s1-c2-wrapper"><g class="blink"><rect y="126" width="10" height="18" fill="#00ff41" class="s1-c2-pos" filter="url(#glow)"/></g></g>
      </g>

      <g class="s1-line3">
        <text x="40" y="180" class="term-text" xml:space="preserve">&gt; STATUS     : </text>
        <text x="202" y="180" class="term-text verified-text" clip-path="url(#s1-L3-clip)" xml:space="preserve">[ √ VERIFIED ]</text>
        <g class="s1-c3-wrapper"><g class="blink"><rect y="166" width="10" height="18" fill="#00ff41" class="s1-c3-pos" filter="url(#glow)"/></g></g>
      </g>
    </g>

    <g id="scene2">
      <g class="s2-line1">
        <text x="40" y="100" class="term-text" xml:space="preserve">&gt; TARGET     : </text>
        <text x="202" y="100" class="term-text" clip-path="url(#s2-L1-clip)" xml:space="preserve">https://github.com/acme-org/repo/skills/SKILL.md</text>
        <text x="202" y="100" class="term-text s2-overlay" clip-path="url(#s2-sweep-clip)" xml:space="preserve">https://github.com/</text>
        <g class="s2-c1-wrapper"><g class="blink"><rect y="86" width="10" height="18" fill="#00ff41" class="s2-c1-pos" filter="url(#glow)"/></g></g>
      </g>

      <rect y="86" height="18" class="s2-sweep-box" filter="url(#glow)"/>

      <g class="s2-line2">
        <text x="40" y="140" class="term-text" xml:space="preserve">&gt; TRUST ROOT : </text>
        <text x="202" y="140" class="term-text" clip-path="url(#s2-L2-clip)" xml:space="preserve">https://github.com/</text>
        <g class="s2-c2-wrapper"><g class="blink"><rect y="126" width="10" height="18" fill="#00ff41" class="s2-c2-pos" filter="url(#glow)"/></g></g>
      </g>

      <g class="s2-line3">
        <text x="40" y="180" class="term-text" xml:space="preserve">&gt; STATUS     : </text>
        <text x="202" y="180" class="term-text rejected-text" clip-path="url(#s2-L3-clip)" xml:space="preserve">[ X REJECTED ]</text>
        <g class="s2-c3-wrapper"><g class="blink"><rect y="166" width="10" height="18" fill="#ff0040" class="s2-c3-pos" filter="url(#glow)"/></g></g>
      </g>
    </g>

    <text x="40" y="380" class="term-text" fill="#008822" opacity="0.6" xml:space="preserve">SYSTEM SECURE READY_</text>
  </g>

  <rect width="100%" height="100%" fill="url(#scanlines)" pointer-events="none" />
</svg>