<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 418">
  <defs>
    <filter id="gold-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <g id="bill-template">
      <rect x="220" y="80" width="360" height="250" rx="0" fill="#f5f0e8" stroke="#2c3e7a" stroke-width="8" stroke-linejoin="round"/>
      <rect x="520" y="100" width="40" height="170" fill="#d4a017" stroke="#2c3e7a" stroke-width="4"/>
      <line x1="490" y1="100" x2="490" y2="310" stroke="#2c3e7a" stroke-width="5" stroke-linecap="round"/>
      <line x1="460" y1="100" x2="460" y2="280" stroke="#2c3e7a" stroke-width="5" stroke-linecap="round"/>
      <line x1="430" y1="120" x2="430" y2="310" stroke="#2c3e7a" stroke-width="5" stroke-linecap="round"/>
      <line x1="400" y1="100" x2="400" y2="250" stroke="#2c3e7a" stroke-width="5" stroke-linecap="round"/>
      <line x1="370" y1="140" x2="370" y2="310" stroke="#2c3e7a" stroke-width="5" stroke-linecap="round"/>
      <line x1="340" y1="100" x2="340" y2="290" stroke="#2c3e7a" stroke-width="5" stroke-linecap="round"/>
      <line x1="310" y1="160" x2="310" y2="310" stroke="#2c3e7a" stroke-width="5" stroke-linecap="round"/>
      <line x1="280" y1="100" x2="280" y2="230" stroke="#2c3e7a" stroke-width="5" stroke-linecap="round"/>
      <rect x="240" y="270" width="45" height="45" rx="5" fill="#c0392b" />
      <circle cx="262.5" cy="292.5" r="14" fill="none" stroke="#f5f0e8" stroke-width="4"/>
    </g>
  </defs>

  <style>
    .hand { animation: handMove 12s infinite cubic-bezier(0.25, 1, 0.5, 1); }
    .bill1 { animation: bill1Move 12s infinite cubic-bezier(0.25, 1, 0.5, 1); transform-origin: 400px 205px; }
    .bill2 { animation: bill2Move 12s infinite cubic-bezier(0.25, 1, 0.5, 1); transform-origin: 400px 205px; }
    .brush { animation: brushMove 12s infinite cubic-bezier(0.4, 0, 0.2, 1); }
    .stroke1 { animation: stroke1Anim 12s infinite linear; stroke-dasharray: 300; }
    .stroke2 { animation: stroke2Anim 12s infinite linear; stroke-dasharray: 300; }
    .watermark { animation: watermarkAnim 12s infinite cubic-bezier(0.175, 0.885, 0.32, 1.275); transform-origin: 400px 205px; }
    .rejectMark { animation: rejectMarkAnim 12s infinite cubic-bezier(0.175, 0.885, 0.32, 1.275); transform-origin: 400px 205px; }

    @keyframes handMove {
      0% { transform: translate(500px, 400px); }
      6% { transform: translate(0px, 0px); }
      10% { transform: translate(0px, 0px); }
      16% { transform: translate(500px, 400px); }
      40% { transform: translate(500px, 400px); }
      46% { transform: translate(0px, 0px); }
      50% { transform: translate(0px, 0px); }
      56% { transform: translate(500px, 400px); }
      100% { transform: translate(500px, 400px); }
    }

    @keyframes bill1Move {
      0% { transform: translate(500px, 400px); opacity: 1; }
      6% { transform: translate(0px, 0px); opacity: 1; }
      38% { transform: translate(0px, 0px); opacity: 1; }
      42% { transform: translate(-600px, -150px) rotate(-15deg); opacity: 1; }
      43% { opacity: 0; }
      100% { opacity: 0; transform: translate(-600px, -150px); }
    }

    @keyframes bill2Move {
      0%, 39% { transform: translate(500px, 400px); opacity: 0; }
      40% { transform: translate(500px, 400px); opacity: 1; }
      46% { transform: translate(0px, 0px); opacity: 1; }
      68% { transform: translate(0px, 0px); opacity: 1; }
      74% { transform: translate(-600px, 300px) rotate(-25deg); opacity: 1; }
      75% { opacity: 0; }
      100% { opacity: 0; }
    }

    @keyframes brushMove {
      0%, 15% { transform: translate(800px, -300px) rotate(45deg); opacity: 0; }
      16% { transform: translate(800px, -300px) rotate(45deg); opacity: 1; }
      19% { transform: translate(260px, 205px) rotate(0deg); opacity: 1; }
      24% { transform: translate(540px, 215px) rotate(-10deg); opacity: 1; }
      29% { transform: translate(800px, 500px) rotate(-30deg); opacity: 1; }
      30%, 55% { transform: translate(800px, -300px) rotate(45deg); opacity: 0; }
      56% { transform: translate(800px, -300px) rotate(45deg); opacity: 1; }
      59% { transform: translate(260px, 205px) rotate(0deg); opacity: 1; }
      64% { transform: translate(540px, 215px) rotate(-10deg); opacity: 1; }
      69% { transform: translate(800px, 500px) rotate(-30deg); opacity: 1; }
      70%, 100% { transform: translate(800px, -300px) rotate(45deg); opacity: 0; }
    }

    @keyframes stroke1Anim {
      0%, 19% { stroke-dashoffset: 300; opacity: 0; }
      20% { stroke-dashoffset: 300; opacity: 0.5; }
      24% { stroke-dashoffset: 0; opacity: 0.5; }
      38% { stroke-dashoffset: 0; opacity: 0.5; }
      42%, 100% { opacity: 0; stroke-dashoffset: 0; }
    }

    @keyframes stroke2Anim {
      0%, 59% { stroke-dashoffset: 300; opacity: 0; stroke: #d4a017; }
      60% { stroke-dashoffset: 300; opacity: 0.5; stroke: #d4a017; }
      64% { stroke-dashoffset: 0; opacity: 0.5; stroke: #d4a017; }
      66% { opacity: 0.9; stroke: #c0392b; }
      68% { opacity: 0.9; stroke: #c0392b; }
      74%, 100% { opacity: 0; stroke-dashoffset: 0; stroke: #c0392b; }
    }

    @keyframes watermarkAnim {
      0%, 23% { opacity: 0; transform: scale(0.95); }
      26% { opacity: 1; transform: scale(1); }
      38% { opacity: 1; transform: scale(1); }
      42%, 100% { opacity: 0; transform: scale(1); }
    }

    @keyframes rejectMarkAnim {
      0%, 65% { opacity: 0; transform: scale(1.3); }
      67% { opacity: 1; transform: scale(1); }
      68% { opacity: 1; transform: scale(1); }
      74%, 100% { opacity: 0; transform: scale(1); }
    }
  </style>

  <rect width="800" height="418" fill="#f5f0e8"/>
  <circle cx="80" cy="50" r="180" fill="#c0392b" opacity="0.9" />

  <g id="desk-woodblock">
    <path d="M -50 418 L 180 200 L 850 200 L 850 418 Z" fill="#d4a017" stroke="#2c3e7a" stroke-width="8" stroke-linejoin="round"/>
    <path d="M 180 200 L 850 200" fill="none" stroke="#f5f0e8" stroke-width="8" />
    <path d="M 180 200 L 850 200" fill="none" stroke="#2c3e7a" stroke-width="4" />
    
    <path d="M 50 418 Q 250 320 850 230" fill="none" stroke="#2c3e7a" stroke-width="5" stroke-linecap="round"/>
    <path d="M 150 418 Q 350 350 850 280" fill="none" stroke="#2c3e7a" stroke-width="10" stroke-linecap="round"/>
    <path d="M 300 418 Q 500 370 850 340" fill="none" stroke="#2c3e7a" stroke-width="4" stroke-linecap="round"/>
    <path d="M 500 418 Q 650 380 850 380" fill="none" stroke="#2c3e7a" stroke-width="8" stroke-linecap="round"/>
    
    <path d="M 220 200 L 260 200 L 600 418 L 450 418 Z" fill="#c0392b" opacity="0.15"/>
  </g>

  <g class="bill1">
    <use href="#bill-template" />
    <path class="stroke1" d="M 260 205 Q 400 185 540 215" fill="none" stroke="#d4a017" stroke-width="45" stroke-linecap="round" />
    
    <g class="watermark" filter="url(#gold-glow)">
      <rect x="250" y="150" width="300" height="100" fill="#f5f0e8" opacity="0.9" />
      <text x="400" y="195" font-family="'Courier New', Courier, monospace" font-size="34" font-weight="900" fill="#d4a017" text-anchor="middle">acme.com</text>
      <text x="400" y="230" font-family="'Courier New', Courier, monospace" font-size="22" font-weight="bold" fill="#d4a017" text-anchor="middle">— verified —</text>
    </g>
  </g>

  <g class="bill2">
    <use href="#bill-template" />
    <path class="stroke2" d="M 260 205 Q 400 185 540 215" fill="none" stroke="#d4a017" stroke-width="45" stroke-linecap="round" />
    
    <g class="rejectMark">
      <circle cx="280" cy="160" r="12" fill="#c0392b"/>
      <circle cx="530" cy="240" r="18" fill="#c0392b"/>
      <circle cx="340" cy="280" r="8" fill="#c0392b"/>
      <circle cx="480" cy="140" r="10" fill="#c0392b"/>
      <circle cx="380" cy="130" r="6" fill="#c0392b"/>
      <path d="M 260 260 L 540 140 M 260 140 L 540 260" stroke="#c0392b" stroke-width="16" stroke-linecap="round"/>
      <rect x="230" y="160" width="340" height="90" fill="#f5f0e8" opacity="0.8" />
      <text x="400" y="225" font-family="'Courier New', Courier, monospace" font-size="65" font-weight="900" fill="#c0392b" text-anchor="middle" transform="rotate(-10 400 225)">REJECTED</text>
    </g>
  </g>

  <g class="hand">
    <path d="M 580 320 Q 650 200 850 150 L 850 418 L 650 418 Q 600 380 580 320 Z" fill="#c0392b" stroke="#2c3e7a" stroke-width="8" stroke-linejoin="round" />
    <path d="M 580 320 Q 610 350 640 400" fill="none" stroke="#2c3e7a" stroke-width="8" stroke-linecap="round"/>
    <path d="M 640 220 C 600 250 580 290 580 320" fill="none" stroke="#2c3e7a" stroke-width="8" stroke-linecap="round"/>
    <path d="M 600 350 Q 560 370 520 340 Q 480 310 510 280 Q 540 280 570 290" fill="#f5f0e8" stroke="#2c3e7a" stroke-width="8" stroke-linejoin="round"/>
    <path d="M 540 330 Q 500 330 480 300 C 480 280 510 270 540 280 C 560 290 580 310 580 320" fill="#f5f0e8" stroke="#2c3e7a" stroke-width="8" stroke-linejoin="round"/>
  </g>

  <g class="brush">
    <path d="M 0 0 C 10 -20 20 -35 30 -50 C 15 -35 5 -20 0 0 Z" fill="#2c3e7a" />
    <path d="M 0 0 C 25 -10 35 -20 40 -35 C 20 -20 10 -10 0 0 Z" fill="#2c3e7a" />
    <path d="M 0 0 Q 30 -30 45 -55 Q 20 -25 0 0 Z" fill="#2c3e7a" />
    <path d="M 35 -45 L 180 -140 L 195 -120 L 50 -25 Z" fill="#d4a017" stroke="#2c3e7a" stroke-width="7" stroke-linejoin="round"/>
    <line x1="85" y1="-75" x2="100" y2="-55" stroke="#2c3e7a" stroke-width="7" stroke-linecap="round"/>
    <line x1="135" y1="-105" x2="150" y2="-85" stroke="#2c3e7a" stroke-width="7" stroke-linecap="round"/>
    <path d="M 180 -140 Q 195 -155 205 -135 L 195 -120" fill="#f5f0e8" stroke="#2c3e7a" stroke-width="7" stroke-linejoin="round"/>
  </g>
</svg>