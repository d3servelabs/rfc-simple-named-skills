<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 418" style="background-color: #e8dfd5; user-select: none; overflow: hidden;">
  <defs>
    <filter id="paper-bg" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="3" result="noise"/>
      <feColorMatrix in="noise" type="matrix" values="
        0 0 0 0 0.8
        0 0 0 0 0.75
        0 0 0 0 0.7
        1 0 0 0 0" result="coloredNoise"/>
      <feBlend in="SourceGraphic" in2="coloredNoise" mode="multiply"/>
    </filter>

    <filter id="torn-box" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="4" xChannelSelector="R" yChannelSelector="G" result="disp"/>
      <feDropShadow in="disp" dx="3" dy="6" stdDeviation="1.5" flood-color="#3d2c1d" flood-opacity="0.35"/>
    </filter>

    <filter id="torn-label" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.06" numOctaves="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G" result="disp"/>
      <feDropShadow in="disp" dx="1" dy="2" stdDeviation="1" flood-color="#3d2c1d" flood-opacity="0.25"/>
    </filter>
  </defs>

  <style>
    .scene-element {
      will-change: transform;
    }
    .b1a { animation: b1a 12s steps(72, end) infinite; }
    .b1b { animation: b1b 12s steps(72, end) infinite; }
    .b1c { animation: b1c 12s steps(72, end) infinite; }
    .b2a { animation: b2a 12s steps(72, end) infinite; }
    .b2b { animation: b2b 12s steps(72, end) infinite; }
    .b2c { animation: b2c 12s steps(72, end) infinite; }
    .hand { animation: hand 12s steps(72, end) infinite; }

    /* BATCH 1: Chaotic Pile */
    @keyframes b1a {
      0%, 4% { transform: translate(350px, -150px) rotate(15deg); }
      6%, 37% { transform: translate(310px, 275px) rotate(-15deg); }
      41%, 100% { transform: translate(-200px, 275px) rotate(-15deg); }
    }
    @keyframes b1b {
      0%, 6.5% { transform: translate(400px, -150px) rotate(-25deg); }
      8.5%, 37% { transform: translate(360px, 245px) rotate(20deg); }
      41%, 100% { transform: translate(-150px, 245px) rotate(20deg); }
    }
    @keyframes b1c {
      0%, 9% { transform: translate(320px, -150px) rotate(45deg); }
      11%, 37% { transform: translate(330px, 215px) rotate(5deg); }
      41%, 100% { transform: translate(-180px, 215px) rotate(5deg); }
    }

    /* BATCH 2: Neat Stack */
    @keyframes b2a {
      0%, 45% { transform: translate(330px, -150px) rotate(5deg); }
      47.5%, 83% { transform: translate(330px, 280px) rotate(0deg); }
      87.5%, 100% { transform: translate(900px, 280px) rotate(0deg); }
    }
    @keyframes b2b {
      0%, 50% { transform: translate(330px, -150px) rotate(-5deg); }
      52.5%, 83% { transform: translate(332px, 230px) rotate(-1deg); }
      87.5%, 100% { transform: translate(902px, 230px) rotate(-1deg); }
    }
    @keyframes b2c {
      0%, 55% { transform: translate(330px, -150px) rotate(3deg); }
      57.5%, 83% { transform: translate(328px, 180px) rotate(1deg); }
      87.5%, 100% { transform: translate(898px, 180px) rotate(1deg); }
    }

    /* HAND ANIMATION */
    @keyframes hand {
      0%, 10% { transform: translate(-400px, 150px) rotate(20deg); }
      /* Nervous jitter over Batch 1 */
      15% { transform: translate(250px, 100px) rotate(10deg); }
      18% { transform: translate(270px, 80px) rotate(15deg); }
      21% { transform: translate(240px, 110px) rotate(5deg); }
      24% { transform: translate(290px, 90px) rotate(20deg); }
      27% { transform: translate(250px, 120px) rotate(8deg); }
      30% { transform: translate(310px, 100px) rotate(18deg); }
      33% { transform: translate(280px, 90px) rotate(12deg); }
      /* Frantic sweep left */
      36% { transform: translate(450px, 150px) rotate(30deg); }
      38% { transform: translate(150px, 180px) rotate(-10deg); }
      41%, 60% { transform: translate(-400px, 180px) rotate(-10deg); }
      
      /* Confident entry from right for Batch 2 */
      65% { transform: translate(750px, 70px) rotate(-30deg); }
      70% { transform: translate(400px, 120px) rotate(-15deg); }
      75%, 80% { transform: translate(380px, 130px) rotate(-10deg); }
      /* Confident grab and carry right */
      83% { transform: translate(330px, 130px) rotate(0deg); }
      87.5%, 100% { transform: translate(900px, 130px) rotate(0deg); }
    }
  </style>

  <rect width="800" height="418" fill="#e8dfd5" filter="url(#paper-bg)" pointer-events="none" />

  <polygon points="100,-20 160,200 130,450 70,450" fill="#dfd4c5" filter="url(#torn-label)" opacity="0.6"/>
  <polygon points="620,-20 680,100 650,450 580,450" fill="#dfd4c5" filter="url(#torn-label)" opacity="0.6"/>

  <polygon points="-20,330 200,320 400,335 600,325 820,330 820,438 -20,438" fill="#c4a882" filter="url(#torn-box)"/>

  <g class="scene-element b1a">
    <polygon points="-2,0 140,3 135,55 5,50" fill="#87a878" filter="url(#torn-box)"/>
    <polygon points="45,10 95,8 90,45 42,42" fill="#f5f0e8" filter="url(#torn-label)"/>
    <text x="70" y="30" dominant-baseline="middle" text-anchor="middle" font-family="Courier, monospace" font-size="36" font-weight="900" fill="#d4a0a0" filter="url(#torn-label)">?</text>
  </g>
  <g class="scene-element b1b">
    <polygon points="2,-2 138,2 142,48 -2,52" fill="#d4a0a0" filter="url(#torn-box)"/>
    <polygon points="20,10 60,15 55,45 15,40" fill="#c4a882" filter="url(#torn-label)"/>
    <text x="38" y="30" dominant-baseline="middle" text-anchor="middle" font-family="Courier, monospace" font-size="32" font-weight="900" fill="#f5f0e8" filter="url(#torn-label)">?</text>
  </g>
  <g class="scene-element b1c">
    <polygon points="0,0 140,-5 145,45 -5,50" fill="#f5f0e8" filter="url(#torn-box)"/>
    <polygon points="80,5 120,10 115,40 75,35" fill="#87a878" filter="url(#torn-label)"/>
    <text x="98" y="25" dominant-baseline="middle" text-anchor="middle" font-family="Courier, monospace" font-size="32" font-weight="900" fill="#c4a882" filter="url(#torn-label)">?</text>
  </g>

  <g class="scene-element b2a">
    <polygon points="0,0 140,2 138,50 2,48" fill="#87a878" filter="url(#torn-box)"/>
    <polygon points="10,8 70,5 68,40 12,42" fill="#f5f0e8" filter="url(#torn-label)"/>
    <text x="15" y="21" font-family="Courier, monospace" font-size="10" font-weight="bold" fill="#3d2c1d">From:</text>
    <text x="15" y="34" font-family="Courier, monospace" font-size="10" font-weight="bold" fill="#3d2c1d">acme.com</text>
    <path d="M 65,25 Q 90,5 105,30 T 130,20" fill="none" stroke="#3d2c1d" stroke-width="1.5" stroke-dasharray="3 3"/>
    <polygon points="127,17 133,17 130,23" fill="#d4a0a0" filter="url(#torn-label)"/>
  </g>
  <g class="scene-element b2b">
    <polygon points="0,2 142,-2 138,48 -2,52" fill="#d4a0a0" filter="url(#torn-box)"/>
    <polygon points="70,10 130,8 128,42 68,40" fill="#f5f0e8" filter="url(#torn-label)"/>
    <text x="75" y="23" font-family="Courier, monospace" font-size="9" font-weight="bold" fill="#3d2c1d">From: acme</text>
    <text x="75" y="35" font-family="Courier, monospace" font-size="9" font-weight="bold" fill="#3d2c1d">.com</text>
    <path d="M 10,25 Q 30,40 50,15" fill="none" stroke="#3d2c1d" stroke-width="1.5" stroke-dasharray="4 3"/>
    <polygon points="8,23 14,24 10,28" fill="#87a878" filter="url(#torn-label)"/>
  </g>
  <g class="scene-element b2c">
    <polygon points="2,-2 138,0 140,52 0,50" fill="#f5f0e8" filter="url(#torn-box)"/>
    <polygon points="40,5 100,10 98,45 38,40" fill="#c4a882" filter="url(#torn-label)"/>
    <text x="45" y="23" font-family="Courier, monospace" font-size="10" font-weight="bold" fill="#3d2c1d">From:</text>
    <text x="45" y="36" font-family="Courier, monospace" font-size="10" font-weight="bold" fill="#3d2c1d">acme.com</text>
    <path d="M 15,25 Q 30,15 40,25 M 100,25 Q 115,35 125,20" fill="none" stroke="#3d2c1d" stroke-width="1.5" stroke-dasharray="3 3"/>
    <polygon points="12,25 18,22 18,28" fill="#87a878" filter="url(#torn-label)"/>
    <polygon points="122,20 128,17 128,23" fill="#d4a0a0" filter="url(#torn-label)"/>
  </g>

  <g class="scene-element hand">
    <polygon points="120,180 90,120 60,110 40,90 45,70 65,65 85,80 80,40 90,20 110,25 115,50 125,50 125,25 145,25 150,55 160,55 165,35 185,40 180,75 190,110 195,150" fill="#f5f0e8" filter="url(#torn-box)"/>
    <polygon points="120,180 195,150 260,220 200,310" fill="#c4a882" filter="url(#torn-box)"/>
  </g>
</svg>