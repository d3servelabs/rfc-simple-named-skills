<svg viewBox="0 0 800 418" width="800" height="418" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <style>
            @keyframes float {
                0%, 100% { transform: translateY(0px); }
                50% { transform: translateY(-8px); }
            }
            @keyframes floatBottle {
                0%, 100% { transform: translateY(0px); }
                50% { transform: translateY(-4px); }
            }
            @keyframes pulse {
                0%, 100% { opacity: 0.6; transform: scale(0.95); }
                50% { opacity: 1; transform: scale(1.05); }
            }
            @keyframes leanBack {
                0%, 100% { transform: rotate(0deg); }
                50% { transform: rotate(4deg); }
            }
            @keyframes leanForward {
                0%, 100% { transform: rotate(0deg); }
                50% { transform: rotate(-4deg); }
            }
            @keyframes reachArm {
                0%, 100% { transform: rotate(0deg); }
                50% { transform: rotate(-8deg); }
            }
            
            .float { animation: float 4s ease-in-out infinite; }
            .float-bottle { animation: floatBottle 3s ease-in-out infinite; }
            .pulse { animation: pulse 2.5s ease-in-out infinite; transform-origin: center; }
            .lean-back { animation: leanBack 4s ease-in-out infinite; transform-origin: 0px 140px; }
            .lean-forward { animation: leanForward 4s ease-in-out infinite; transform-origin: 0px 140px; }
            .reach-arm { animation: reachArm 4s ease-in-out infinite; transform-origin: -5px 50px; }
            
            .navy { fill: #1a2332; }
            .navy-str { stroke: #1a2332; }
            .red { fill: #dc2626; }
            .red-str { stroke: #dc2626; }
            .cream { fill: #f5f0e8; }
            .cream-str { stroke: #f5f0e8; }
            .gold { fill: #d4a017; }
            .gold-str { stroke: #d4a017; }
        </style>

        <!-- Reusable Folk Dress Motif -->
        <g id="folk-dress">
            <!-- Tunic base -->
            <path d="M -25 140 C -15 80 -10 40 0 40 C 10 40 15 80 25 140 Z" class="navy"/>
            <!-- Bottom trim -->
            <path d="M -25 140 C -10 145 10 145 25 140 L 25 130 C 10 135 -10 135 -25 130 Z" class="red"/>
            <!-- Embroidery Details -->
            <circle cx="0" cy="60" r="6" class="cream"/>
            <circle cx="0" cy="60" r="2" class="red"/>
            <circle cx="0" cy="85" r="8" class="gold"/>
            <circle cx="0" cy="85" r="3" class="navy"/>
            <circle cx="0" cy="115" r="10" class="red"/>
            <circle cx="0" cy="115" r="4" class="cream"/>
            <!-- Side leaves -->
            <path d="M -10 85 Q -15 75 -20 85 Q -15 95 -10 85" class="cream"/>
            <path d="M 10 85 Q 15 75 20 85 Q 15 95 10 85" class="cream"/>
        </g>

        <!-- Reusable Inner Corner Flourish -->
        <g id="folk-branch">
            <path d="M 0 0 Q 20 -40 60 -50" class="gold-str" stroke-width="3" fill="none" stroke-linecap="round"/>
            <path d="M 15 -25 Q 10 -40 0 -35 Q 5 -25 15 -25 Z" class="red"/>
            <path d="M 35 -38 Q 35 -55 25 -50 Q 30 -40 35 -38 Z" class="red"/>
            <path d="M 55 -48 Q 65 -60 75 -50 Q 65 -40 55 -48 Z" class="navy"/>
        </g>
    </defs>

    <!-- Global Background -->
    <rect width="800" height="418" class="navy"/>

    <!-- Decorative Border Frame -->
    <rect x="15" y="15" width="770" height="388" fill="none" class="gold-str" stroke-width="4" rx="10"/>
    <rect x="22" y="22" width="756" height="374" fill="none" class="red-str" stroke-width="1.5" rx="8"/>

    <!-- Border Corners -->
    <!-- Top Left -->
    <path d="M 22 55 Q 22 22 55 22" class="gold-str" stroke-width="5" fill="none"/>
    <circle cx="22" cy="55" r="4" class="red"/>
    <circle cx="55" cy="22" r="4" class="red"/>
    <circle cx="34" cy="34" r="6" class="red"/>
    <circle cx="34" cy="34" r="2" class="cream"/>
    <!-- Top Right -->
    <path d="M 778 55 Q 778 22 745 22" class="gold-str" stroke-width="5" fill="none"/>
    <circle cx="778" cy="55" r="4" class="red"/>
    <circle cx="745" cy="22" r="4" class="red"/>
    <circle cx="766" cy="34" r="6" class="red"/>
    <circle cx="766" cy="34" r="2" class="cream"/>
    <!-- Bottom Left -->
    <path d="M 22 345 Q 22 378 55 378" class="gold-str" stroke-width="5" fill="none"/>
    <circle cx="22" cy="345" r="4" class="red"/>
    <circle cx="55" cy="378" r="4" class="red"/>
    <circle cx="34" cy="366" r="6" class="red"/>
    <circle cx="34" cy="366" r="2" class="cream"/>
    <!-- Bottom Right -->
    <path d="M 778 345 Q 778 378 745 378" class="gold-str" stroke-width="5" fill="none"/>
    <circle cx="778" cy="345" r="4" class="red"/>
    <circle cx="745" cy="378" r="4" class="red"/>
    <circle cx="766" cy="366" r="6" class="red"/>
    <circle cx="766" cy="366" r="2" class="cream"/>

    <!-- Center Divider -->
    <line x1="400" y1="50" x2="400" y2="368" class="gold-str" stroke-width="2" stroke-dasharray="8 8"/>
    <circle cx="400" cy="209" r="16" class="navy gold-str" stroke-width="2"/>
    <path d="M 400 199 C 405 199 405 219 400 219 C 395 219 395 199 400 199 Z" class="red"/>


    <!-- ========================================== -->
    <!-- SCENE 1: LEFT SIDE (DOUBT / UNKNOWN SOURCE)-->
    <!-- ========================================== -->
    
    <!-- Background Panel -->
    <rect x="50" y="50" width="325" height="318" rx="16" class="cream"/>
    <rect x="55" y="55" width="315" height="308" rx="11" fill="none" class="gold-str" stroke-width="1" stroke-dasharray="4 4"/>
    
    <!-- Folk Botanicals -->
    <use href="#folk-branch" x="50" y="368"/>
    <use href="#folk-branch" transform="translate(375, 368) scale(-1, 1)"/>

    <!-- Left Hand & Unlabeled Bottle -->
    <g transform="translate(70, 200)">
        <g class="float">
            <!-- Sleeve -->
            <path d="M -20 -15 L 50 -10 L 50 15 L -20 20 Z" class="red"/>
            <!-- Gold folk pattern on sleeve -->
            <path d="M 0 -13 L 15 0 L 0 14 M 25 -11 L 40 0 L 25 12" class="gold-str" stroke-width="3" fill="none" stroke-linejoin="round"/>
            <!-- Hand -->
            <path d="M 50 -8 C 70 -8 70 8 50 8" class="cream navy-str" stroke-width="2"/>
            
            <!-- Unknown Bottle -->
            <g transform="translate(60, -35)">
                <rect x="0" y="0" width="24" height="12" rx="2" class="navy"/>
                <rect x="-2" y="12" width="28" height="35" rx="3" class="navy"/>
            </g>

            <!-- Floating Question Marks -->
            <g transform="translate(70, -35)" class="pulse">
                <text x="35" y="-10" class="red" font-family="Georgia, serif" font-weight="bold" font-size="22">?</text>
                <text x="10" y="-25" class="red" font-family="Georgia, serif" font-weight="bold" font-size="16">?</text>
                <text x="30" y="25" class="navy" font-family="Georgia, serif" font-weight="bold" font-size="18">?</text>
            </g>
        </g>
    </g>

    <!-- Concerned Character -->
    <g transform="translate(265, 160)">
        <g class="lean-back">
            <!-- Legs -->
            <path d="M -10 140 L -10 170 M 10 140 L 10 170" class="navy-str" stroke-width="6" stroke-linecap="round"/>
            <!-- Feet -->
            <path d="M -18 170 C -18 165 -10 165 -6 170 Z M 2 170 C 2 165 10 165 14 170 Z" class="navy"/>
            <!-- Dress -->
            <use href="#folk-dress"/>
            <!-- Arm (Defensive) -->
            <path d="M -5 50 L -35 65 L -45 45" class="navy-str" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <circle cx="-45" cy="45" r="4" class="cream"/>
            <!-- Head & Bonnet -->
            <circle cx="0" cy="5" r="22" class="red"/>
            <circle cx="-2" cy="15" r="18" class="cream"/>
            <!-- Rosy Cheek -->
            <circle cx="-6" cy="18" r="3" fill="#dc2626" opacity="0.3"/>
            <!-- Face Details (Concerned, facing left) -->
            <circle cx="-10" cy="12" r="2" class="navy"/>
            <circle cx="0" cy="12" r="2" class="navy"/>
            <path d="M -14 8 L -8 6 M -2 6 L 4 8" class="navy-str" stroke-width="2" stroke-linecap="round"/>
            <path d="M -10 24 Q -5 20 0 24" class="navy-str" stroke-width="2" fill="none" stroke-linecap="round"/>
        </g>
    </g>


    <!-- ========================================== -->
    <!-- SCENE 2: RIGHT SIDE (TRUST / KNOWN SOURCE) -->
    <!-- ========================================== -->
    
    <!-- Background Panel -->
    <rect x="425" y="50" width="325" height="318" rx="16" class="cream"/>
    <rect x="430" y="55" width="315" height="308" rx="11" fill="none" class="gold-str" stroke-width="1" stroke-dasharray="4 4"/>

    <!-- Folk Botanicals -->
    <use href="#folk-branch" x="425" y="368"/>
    <use href="#folk-branch" transform="translate(750, 368) scale(-1, 1)"/>

    <!-- License Plate / Domain Verification -->
    <g transform="translate(460, 90)">
        <rect x="0" y="0" width="100" height="55" rx="6" class="cream gold-str" stroke-width="4"/>
        <rect x="6" y="6" width="88" height="43" rx="3" fill="none" class="navy-str" stroke-width="1.5" stroke-dasharray="3 3"/>
        
        <!-- Verification Seal (Red Ribbon) -->
        <path d="M 75 25 L 70 35 L 80 32 L 90 35 L 85 25 Z" class="red"/>
        <circle cx="80" cy="20" r="8" class="navy"/>
        <path d="M 77 20 L 79 23 L 84 17" class="cream-str" stroke-width="2" fill="none" stroke-linecap="round"/>
        
        <!-- Security Lock Motif -->
        <rect x="20" y="24" width="10" height="8" rx="1" class="navy"/>
        <path d="M 22 24 L 22 20 A 3 3 0 0 1 28 20 L 28 24" class="navy-str" stroke-width="2" fill="none"/>
        
        <!-- Domain text abstraction -->
        <rect x="35" y="27" width="35" height="4" rx="2" class="navy"/>
        <rect x="20" y="38" width="50" height="3" rx="1" class="navy"/>
    </g>

    <!-- Pharmacy Shelf -->
    <rect x="450" y="240" width="110" height="8" rx="4" class="gold"/>
    <path d="M 460 248 L 460 260 L 475 248 Z" class="navy"/>
    <path d="M 540 248 L 540 260 L 525 248 Z" class="navy"/>

    <!-- Labeled Bottles (Domains) -->
    <!-- Bottle 1 -->
    <g transform="translate(460, 205)">
        <rect x="0" y="0" width="20" height="35" rx="2" class="navy"/>
        <rect x="2" y="-5" width="16" height="5" rx="1" class="navy"/>
        <rect x="0" y="10" width="20" height="15" class="cream"/>
        <circle cx="10" cy="17.5" r="4" class="red"/>
    </g>

    <!-- Bottle 3 -->
    <g transform="translate(530, 215)">
        <rect x="0" y="0" width="18" height="25" rx="2" class="navy"/>
        <rect x="1" y="-5" width="16" height="5" rx="1" class="navy"/>
        <rect x="0" y="7" width="18" height="12" class="cream"/>
        <!-- Checkered Pattern -->
        <rect x="3" y="9" width="4" height="4" class="navy"/>
        <rect x="11" y="9" width="4" height="4" class="navy"/>
        <rect x="3" y="13" width="4" height="4" class="navy"/>
        <rect x="11" y="13" width="4" height="4" class="navy"/>
    </g>

    <!-- Target Bottle (Glowing / Picked Up) -->
    <g transform="translate(490, 195)">
        <g class="float-bottle">
            <rect x="0" y="0" width="24" height="45" rx="2" class="navy"/>
            <rect x="2" y="-5" width="20" height="5" rx="1" class="navy"/>
            <!-- Domain Label -->
            <rect x="0" y="15" width="24" height="20" class="cream"/>
            <!-- Star Domain Motif -->
            <path d="M 12 17 L 15 25 L 8 20 L 16 20 L 9 25 Z" class="gold"/>
            
            <!-- Sparkles -->
            <g transform="translate(12, 10)" class="pulse">
                <path d="M 0 -25 L 2 -18 L 9 -16 L 2 -14 L 0 -7 L -2 -14 L -9 -16 L -2 -18 Z" class="gold"/>
                <path d="M -22 -5 L -20 -1 L -16 0 L -20 1 L -22 5 L -24 1 L -28 0 L -24 -1 Z" class="gold"/>
                <path d="M 22 5 L 24 9 L 28 10 L 24 11 L 22 15 L 20 11 L 16 10 L 20 9 Z" class="gold"/>
            </g>
        </g>
    </g>

    <!-- Confident Character -->
    <g transform="translate(640, 160)">
        <g class="lean-forward">
            <!-- Legs -->
            <path d="M -10 140 L -10 170 M 10 140 L 10 170" class="navy-str" stroke-width="6" stroke-linecap="round"/>
            <!-- Feet -->
            <path d="M -18 170 C -18 165 -10 165 -6 170 Z M 2 170 C 2 165 10 165 14 170 Z" class="navy"/>
            <!-- Dress -->
            <use href="#folk-dress"/>
            
            <!-- Arm (Reaching Confidently) -->
            <g class="reach-arm">
                <path d="M -5 50 L -70 45" class="navy-str" stroke-width="8" stroke-linecap="round" fill="none"/>
                <!-- Open hand -->
                <circle cx="-70" cy="45" r="4" class="cream"/>
                <path d="M -74 42 L -78 40 M -74 48 L -78 50" class="navy-str" stroke-width="2" stroke-linecap="round" fill="none"/>
            </g>
            
            <!-- Head & Bonnet -->
            <circle cx="0" cy="5" r="22" class="red"/>
            <circle cx="-2" cy="15" r="18" class="cream"/>
            <!-- Rosy Cheek -->
            <circle cx="-6" cy="18" r="3" fill="#dc2626" opacity="0.4"/>
            <!-- Face Details (Confident/Smiling, facing left) -->
            <circle cx="-10" cy="12" r="2" class="navy"/>
            <circle cx="0" cy="12" r="2" class="navy"/>
            <path d="M -14 6 Q -11 4 -8 6 M -2 6 Q 1 4 4 6" class="navy-str" stroke-width="2" stroke-linecap="round" fill="none"/>
            <path d="M -10 22 Q -5 28 0 22" class="navy-str" stroke-width="2" fill="none" stroke-linecap="round"/>
        </g>
    </g>

</svg>