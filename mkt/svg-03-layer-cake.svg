<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 418" width="800" height="418">
  <defs>
    <style>
      .navy-bar { animation: slideNavy 8s infinite; }
      .teal-bar { animation: slideTeal 8s infinite; }
      .orange-bar { animation: dropOrange 8s infinite; }
      .accents { animation: revealAccents 8s infinite; }
      .pulse-group { animation: pulseAll 8s infinite; transform-origin: 400px 209px; }

      text {
        font-family: 'Futura', 'Trebuchet MS', Arial, sans-serif;
        font-weight: 900;
      }

      @keyframes slideNavy {
        0%, 5% { transform: translateX(-900px); animation-timing-function: cubic-bezier(0.175, 0.885, 0.32, 1.15); }
        15%, 80% { transform: translateX(0); animation-timing-function: cubic-bezier(0.6, -0.28, 0.735, 0.045); }
        90%, 100% { transform: translateX(-900px); }
      }
      @keyframes slideTeal {
        0%, 15% { transform: translateX(900px); animation-timing-function: cubic-bezier(0.175, 0.885, 0.32, 1.15); }
        25%, 80% { transform: translateX(0); animation-timing-function: cubic-bezier(0.6, -0.28, 0.735, 0.045); }
        90%, 100% { transform: translateX(900px); }
      }
      @keyframes dropOrange {
        0%, 25% { transform: translateY(-500px); animation-timing-function: cubic-bezier(0.175, 0.885, 0.32, 1.2); }
        35%, 80% { transform: translateY(0); animation-timing-function: cubic-bezier(0.6, -0.28, 0.735, 0.045); }
        90%, 100% { transform: translateY(-500px); }
      }
      @keyframes revealAccents {
        0%, 35% { opacity: 0; transform: translateY(20px); animation-timing-function: cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        45%, 80% { opacity: 1; transform: translateY(0); animation-timing-function: ease-in; }
        90%, 100% { opacity: 0; transform: translateY(20px); }
      }
      @keyframes pulseAll {
        0%, 60% { transform: scale(1); animation-timing-function: ease-out; }
        64% { transform: scale(1.04); animation-timing-function: ease-in-out; }
        69%, 100% { transform: scale(1); }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="418" fill="#f5f0e8" />

  <!-- Global Pulse Group -->
  <g class="pulse-group">
    
    <!-- Accents -->
    <g class="accents">
      <!-- Bauhaus Diagonal Line -->
      <line x1="220" y1="460" x2="620" y2="-40" stroke="#111" stroke-width="12" />
      
      <!-- Kandinsky-inspired Yellow Circle -->
      <circle cx="680" cy="230" r="100" fill="#facc15" stroke="#111" stroke-width="8" />
      
      <!-- Headline Text -->
      <text x="45" y="65" fill="#111" font-size="44" letter-spacing="-1">New layer.</text>
      <text x="45" y="115" fill="#111" font-size="44" letter-spacing="-1">Same foundation.</text>
    </g>

    <!-- Bottom Bar (Navy) -->
    <g class="navy-bar">
      <rect x="150" y="280" width="700" height="100" fill="#1a2332" stroke="#111" stroke-width="8" />
      <text x="500" y="341" fill="#f5f0e8" font-size="36" letter-spacing="2" text-anchor="middle">DNS — 1983</text>
    </g>

    <!-- Middle Bar (Teal) -->
    <g class="teal-bar">
      <rect x="-50" y="180" width="600" height="100" fill="#0d9488" stroke="#111" stroke-width="8" />
      <text x="275" y="241" fill="#f5f0e8" font-size="36" letter-spacing="2" text-anchor="middle">TLS — 1995</text>
    </g>

    <!-- Top Bar (Orange) -->
    <g class="orange-bar">
      <rect x="350" y="80" width="500" height="100" rx="50" fill="#f97316" stroke="#111" stroke-width="8" />
      <text x="600" y="141" fill="#111" font-size="36" letter-spacing="2" text-anchor="middle">DVS — 2026</text>
    </g>

  </g>
</svg>