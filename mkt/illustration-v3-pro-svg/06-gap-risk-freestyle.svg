<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
<defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#050a10;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#0d1624;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="riskGrad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" style="stop-color:#ff2a2a;stop-opacity:0.6" />
        <stop offset="100%" style="stop-color:#ff2a2a;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="safeGrad" x1="0%" y1="100%" x2="0%" y2="0%">
        <stop offset="0%" style="stop-color:#00ffcc;stop-opacity:0.6" />
        <stop offset="100%" style="stop-color:#00ffcc;stop-opacity:0" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="5" result="blur" />
        <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="strongGlow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="12" result="blur" />
        <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
</defs>

<style>
<![CDATA[
    @keyframes dash {
        to { stroke-dashoffset: 0; }
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulseRisk {
        0%, 100% { fill-opacity: 0.3; }
        50% { fill-opacity: 0.7; }
    }
    @keyframes flicker {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.6; }
    }
    @keyframes moveDVS {
        0% { transform: translateY(0); opacity: 0; }
        60% { transform: translateY(0); opacity: 0; }
        80% { transform: translateY(-400px); opacity: 1; }
        100% { transform: translateY(-400px); opacity: 1; }
    }
    @keyframes revealGap {
        0% { clip-path: inset(0 100% 0 0); }
        100% { clip-path: inset(0 0 0 0); }
    }
    @keyframes labelFloat {
        0% { transform: translateX(0); }
        100% { transform: translateX(5px); }
    }
    .cap-line { 
        stroke: #00f2ff; 
        stroke-width: 6; 
        fill: none; 
        stroke-dasharray: 2000; 
        stroke-dashoffset: 2000; 
        animation: dash 5s cubic-bezier(0.4, 0, 0.2, 1) forwards; 
        filter: url(#glow);
    }
    .trust-line { 
        stroke: #667c89; 
        stroke-width: 4; 
        fill: none; 
        stroke-dasharray: 1000; 
        stroke-dashoffset: 1000; 
        animation: dash 4s ease-out forwards; 
    }
    .risk-area {
        fill: url(#riskGrad);
        animation: revealGap 5s cubic-bezier(0.4, 0, 0.2, 1) forwards, pulseRisk 2s infinite ease-in-out;
    }
    .label { 
        fill: #8e9aaf; 
        font-family: 'Segoe UI', Roboto, sans-serif; 
        font-size: 14px; 
        font-weight: 500; 
        opacity: 0;
        text-transform: uppercase;
        letter-spacing: 1px;
    }
    .milestone {
        fill: #00f2ff;
        font-family: 'Segoe UI', Roboto, sans-serif;
        font-size: 16px;
        font-weight: bold;
        opacity: 0;
    }
    .title {
        fill: #ffffff;
        font-family: 'Segoe UI', Roboto, sans-serif;
        font-size: 48px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 4px;
        filter: url(#glow);
    }
    .subtitle {
        fill: #ff2a2a;
        font-family: 'Segoe UI', Roboto, sans-serif;
        font-size: 24px;
        font-weight: 400;
        letter-spacing: 2px;
    }
    .dvs-box {
        animation: moveDVS 8s infinite alternate;
    }
    .dvs-label {
        fill: #00ffcc;
        font-family: 'Segoe UI', Roboto, sans-serif;
        font-size: 28px;
        font-weight: 900;
        filter: url(#strongGlow);
    }
    .node {
        fill: #00f2ff;
        filter: url(#glow);
    }
]]>
</style>

<!-- Background -->
<rect width="1600" height="900" fill="url(#bgGrad)" />

<!-- Grid -->
<g stroke="#ffffff" stroke-opacity="0.05" stroke-width="1">
    <path d="M150 100 V800 M350 100 V800 M550 100 V800 M750 100 V800 M950 100 V800 M1150 100 V800 M1350 100 V800" />
    <path d="M150 800 H1450 M150 600 H1450 M150 400 H1450 M150 200 H1450" />
</g>

<!-- Risk Area -->
<path class="risk-area" d="M 150 780 Q 550 770 750 650 T 1150 350 T 1450 100 L 1450 780 L 150 780 Z" />

<!-- Curves -->
<path class="trust-line" d="M 150 780 L 1450 780" />
<path class="cap-line" d="M 150 780 Q 550 770 750 650 T 1150 350 T 1450 100" />

<!-- Nodes & Milestones -->
<g>
    <!-- Text Gen -->
    <circle class="node" cx="250" cy="778" r="5" style="animation: fadeIn 0.5s forwards 0.5s;" />
    <text class="milestone" x="260" y="770" style="animation: fadeIn 0.5s forwards 0.5s;">TEXT GEN</text>
    
    <!-- Code Exec -->
    <circle class="node" cx="450" cy="770" r="5" style="animation: fadeIn 0.5s forwards 1.2s;" />
    <text class="milestone" x="460" y="750" style="animation: fadeIn 0.5s forwards 1.2s;">CODE EXECUTION</text>
    
    <!-- MCP -->
    <circle class="node" cx="650" cy="715" r="5" style="animation: fadeIn 0.5s forwards 2.0s;" />
    <text class="milestone" x="660" y="695" style="animation: fadeIn 0.5s forwards 2.0s;">TOOL USE (MCP)</text>
    
    <!-- Computer Use -->
    <circle class="node" cx="850" cy="580" r="6" style="animation: fadeIn 0.5s forwards 2.8s;" />
    <text class="milestone" x="860" y="560" style="animation: fadeIn 0.5s forwards 2.8s;">COMPUTER USE</text>
    
    <!-- A2A -->
    <circle class="node" cx="1050" cy="420" r="7" style="animation: fadeIn 0.5s forwards 3.6s;" />
    <text class="milestone" x="1060" y="400" style="animation: fadeIn 0.5s forwards 3.6s;">MULTI-AGENT (A2A)</text>
    
    <!-- Auto Code -->
    <circle class="node" cx="1250" cy="240" r="8" style="animation: fadeIn 0.5s forwards 4.4s;" />
    <text class="milestone" x="1260" y="220" style="animation: fadeIn 0.5s forwards 4.4s;">AUTONOMOUS CODING</text>
    
    <!-- Full Autonomy -->
    <circle class="node" cx="1450" cy="100" r="10" style="animation: fadeIn 0.5s forwards 5.2s;" />
    <text class="milestone" x="1260" y="100" style="animation: fadeIn 0.5s forwards 5.2s; text-anchor: end;">FULL AUTONOMY</text>
</g>

<!-- Labels -->
<text x="150" y="820" class="label" style="animation: fadeIn 1s forwards;">Verification (Skill Layer)</text>
<text x="1450" y="70" class="label" style="text-anchor: end; fill: #00f2ff; animation: fadeIn 1s forwards;">Agent Capabilities</text>

<!-- Headers -->
<text x="800" y="100" class="title" text-anchor="middle">THE GAP IS THE RISK</text>
<text x="800" y="145" class="subtitle" text-anchor="middle">UNPRICED LIABILITY AT THE AUTONOMY FRONTIER</text>

<!-- Risk Warning -->
<g style="animation: flicker 1s infinite;">
    <path d="M 1200 550 L 1230 500 L 1260 550 Z" fill="#ff2a2a" />
    <text x="1275" y="540" fill="#ff2a2a" font-family="monospace" font-size="22" font-weight="bold">SYSTEMIC RISK ZONE</text>
</g>

<!-- DVS Intervention -->
<g class="dvs-box">
    <rect x="500" y="760" width="600" height="60" rx="30" fill="#00ffcc" fill-opacity="0.1" stroke="#00ffcc" stroke-width="2" />
    <text x="800" y="800" class="dvs-label" text-anchor="middle">DVS: TRUST VERIFICATION LAYER</text>
    <path d="M 800 760 V 600" stroke="#00ffcc" stroke-width="3" stroke-dasharray="10 5" />
    <circle cx="800" cy="600" r="8" fill="#00ffcc" filter="url(#glow)" />
</g>

<!-- Axis Arrows -->
<marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
  <path d="M 0 0 L 10 5 L 0 10 z" fill="#8e9aaf" />
</marker>
<line x1="150" y1="800" x2="150" y2="50" stroke="#8e9aaf" stroke-width="2" marker-end="url(#arrow)" />
<line x1="150" y1="800" x2="1550" y2="800" stroke="#8e9aaf" stroke-width="2" marker-end="url(#arrow)" />

<text x="50" y="450" class="label" transform="rotate(-90 50 450)" text-anchor="middle">LEVEL OF AUTONOMY / TRUST</text>
<text x="1500" y="840" class="label" text-anchor="end">EVOLUTION OF AGENTS</text>

</svg>