<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="15"/>
      <feOffset dx="0" dy="10" result="offsetblur"/>
      <feFlood flood-color="#000000" flood-opacity="0.08"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style><![CDATA[
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      @keyframes scaleIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
      @keyframes slideDown { from { transform: translateY(-40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
      @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
      @keyframes slideRight { from { transform: translateX(-40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
      @keyframes drawLine { from { stroke-dashoffset: 200; } to { stroke-dashoffset: 0; } }

      .bg { animation: fadeIn 1s ease-out forwards; }
      .header { animation: slideDown 0.8s ease-out 0.5s both; font-family: 'Segoe UI', Helvetica, Arial, sans-serif; }
      .divider { animation: fadeIn 1s ease-out 0.8s both; }
      
      .left-card { animation: scaleIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) 1s both; transform-origin: 390px 450px; }
      .bot-group { animation: scaleIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 1.5s both; transform-origin: 390px 380px; }
      .left-ui { animation: slideUp 0.8s ease-out 2s both; }
      
      .right-card { animation: scaleIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) 2.5s both; transform-origin: 1210px 450px; }
      .hub-circle { animation: scaleIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 3s both; transform-origin: 1210px 400px; }
      .conn-line { stroke-dasharray: 200; stroke-dashoffset: 200; animation: drawLine 0.8s ease-out forwards; }
      .node-1, .node-2, .node-3, .node-4 { animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 3.5s both; transform-origin: center; }
      .node-5, .node-6, .node-7, .node-8 { animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 4.5s both; transform-origin: center; }
      .right-ui { animation: slideUp 0.8s ease-out 5.5s both; }
      
      .center-arrow { animation: slideRight 0.8s ease-out 6s both; }
      
      .text-bold { font-weight: 700; }
      .text-caps { text-transform: uppercase; letter-spacing: 1px; }
    ]]></style>
  </defs>

  <!-- Background -->
  <rect class="bg" width="1600" height="900" fill="#F5F7FA"/>

  <!-- Header Section -->
  <g class="header">
    <text x="800" y="80" text-anchor="middle" font-size="34" fill="#2C3E50" class="text-bold">SAME INSTALL BUTTON, 10x THE BLAST RADIUS</text>
    <line class="divider" x1="400" y1="120" x2="1200" y2="120" stroke="#E0E0E0" stroke-width="2"/>
  </g>

  <!-- Left Card: LAST YEAR -->
  <g class="left-card">
    <rect x="60" y="150" width="660" height="680" rx="12" fill="#FFFFFF" filter="url(#cardShadow)"/>
    <rect x="330" y="180" width="120" height="32" rx="16" fill="#EBF5FB"/>
    <text x="390" y="202" text-anchor="middle" font-size="14" fill="#4A90D9" class="text-bold text-caps" font-family="Segoe UI">LAST YEAR</text>
    
    <!-- Chatbot Icon -->
    <g class="bot-group">
      <rect x="355" y="350" width="70" height="60" rx="12" fill="#4A90D9"/>
      <circle cx="375" y="375" r="5" fill="#FFFFFF"/>
      <circle cx="405" y="375" r="5" fill="#FFFFFF"/>
      <rect x="375" y="390" width="30" height="4" rx="2" fill="#FFFFFF"/>
      <rect x="388" y="335" width="4" height="15" fill="#4A90D9"/>
      <circle cx="390" y="335" r="6" fill="#4A90D9"/>
      <!-- Arm and Label -->
      <path d="M425,385 L460,385" stroke="#4A90D9" stroke-width="4" stroke-linecap="round"/>
      <rect x="460" y="370" width="120" height="30" rx="15" fill="#EBF5FB"/>
      <text x="520" y="390" text-anchor="middle" font-size="13" fill="#4A90D9" class="text-bold" font-family="Segoe UI">GENERATE TEXT</text>
    </g>

    <!-- UI Elements -->
    <g class="left-ui">
      <rect x="320" y="550" width="140" height="44" rx="22" fill="#27AE60"/>
      <text x="390" y="578" text-anchor="middle" font-size="16" fill="#FFFFFF" class="text-bold" font-family="Segoe UI">INSTALL</text>
      
      <g transform="translate(100, 650)">
        <text x="0" y="30" font-size="14" fill="#95A5A6" class="text-caps" font-family="Segoe UI">Capability</text>
        <text x="200" y="30" font-size="16" fill="#2C3E50" font-family="Segoe UI">Answer Questions</text>
        
        <text x="0" y="70" font-size="14" fill="#95A5A6" class="text-caps" font-family="Segoe UI">Access</text>
        <text x="200" y="70" font-size="16" fill="#2C3E50" font-family="Segoe UI">None</text>
        
        <text x="0" y="110" font-size="14" fill="#95A5A6" class="text-caps" font-family="Segoe UI">Worst Case</text>
        <text x="200" y="110" font-size="16" fill="#27AE60" font-family="Segoe UI" class="text-bold">Wrong Answer</text>
      </g>
    </g>
  </g>

  <!-- Center Transition -->
  <g class="center-arrow">
    <rect x="740" y="440" width="100" height="20" rx="10" fill="#4A90D9"/>
    <path d="M840 425 L870 450 L840 475 Z" fill="#4A90D9"/>
    <text x="800" y="490" text-anchor="middle" font-size="15" fill="#4A90D9" class="text-bold" font-family="Segoe UI">SAME BUTTON</text>
  </g>

  <!-- Right Card: TODAY -->
  <g class="right-card">
    <rect x="880" y="150" width="660" height="680" rx="12" fill="#FFFFFF" filter="url(#cardShadow)"/>
    <rect x="1150" y="180" width="120" height="32" rx="16" fill="#FDEDEC"/>
    <text x="1210" y="202" text-anchor="middle" font-size="14" fill="#E74C3C" class="text-bold text-caps" font-family="Segoe UI">TODAY</text>
    
    <!-- Agent Hub -->
    <g transform="translate(1210, 400)">
      <!-- Connections -->
      <g class="conn-line-group">
        <line class="conn-line" x1="0" y1="0" x2="0" y2="-160" stroke="#BDC3C7" stroke-width="2" style="animation-delay: 3.2s;"/>
        <line class="conn-line" x1="0" y1="0" x2="113" y2="-113" stroke="#BDC3C7" stroke-width="2" style="animation-delay: 3.3s;"/>
        <line class="conn-line" x1="0" y1="0" x2="160" y2="0" stroke="#BDC3C7" stroke-width="2" style="animation-delay: 3.4s;"/>
        <line class="conn-line" x1="0" y1="0" x2="113" y2="113" stroke="#BDC3C7" stroke-width="2" style="animation-delay: 3.5s;"/>
        <line class="conn-line" x1="0" y1="0" x2="0" y2="160" stroke="#BDC3C7" stroke-width="2" style="animation-delay: 4.2s;"/>
        <line class="conn-line" x1="0" y1="0" x2="-113" y2="113" stroke="#BDC3C7" stroke-width="2" style="animation-delay: 4.3s;"/>
        <line class="conn-line" x1="0" y1="0" x2="-160" y2="0" stroke="#BDC3C7" stroke-width="2" style="animation-delay: 4.4s;"/>
        <line class="conn-line" x1="0" y1="0" x2="-113" y2="-113" stroke="#BDC3C7" stroke-width="2" style="animation-delay: 4.5s;"/>
      </g>
      
      <!-- Nodes -->
      <g class="node-1" transform="translate(0, -160)">
        <circle r="22" fill="#3498DB"/><rect x="-10" y="-10" width="20" height="15" rx="2" fill="#FFF"/><text y="-35" text-anchor="middle" font-size="12" fill="#555" font-family="Segoe UI">FILE SYSTEM</text>
      </g>
      <g class="node-2" transform="translate(113, -113)">
        <circle r="22" fill="#9B59B6"/><ellipse cx="0" cy="-5" rx="10" ry="4" fill="#FFF"/><rect x="-10" y="-5" width="20" height="10" fill="#FFF"/><ellipse cx="0" cy="5" rx="10" ry="4" fill="#FFF"/><text x="28" y="-15" text-anchor="start" font-size="12" fill="#555" font-family="Segoe UI">DATABASE</text>
      </g>
      <g class="node-3" transform="translate(160, 0)">
        <circle r="22" fill="#1ABC9C"/><circle r="8" fill="none" stroke="#FFF" stroke-width="4"/><path d="M0 -10 L0 -6 M0 6 L0 10 M-10 0 L-6 0 M6 0 L10 0" stroke="#FFF" stroke-width="3"/><text x="28" y="5" text-anchor="start" font-size="12" fill="#555" font-family="Segoe UI">CI/CD</text>
      </g>
      <g class="node-4" transform="translate(113, 113)">
        <circle r="22" fill="#F39C12"/><circle cx="-4" cy="0" r="6" fill="none" stroke="#FFF" stroke-width="3"/><rect x="2" y="-2" width="10" height="4" fill="#FFF"/><text x="28" y="25" text-anchor="start" font-size="12" fill="#555" font-family="Segoe UI">API KEYS</text>
      </g>
      <g class="node-5" transform="translate(0, 160)">
        <circle r="22" fill="#2980B9"/><path d="M0 -10 L9 -5 L9 5 L0 10 L-9 5 L-9 -5 Z" fill="#FFF"/><text y="40" text-anchor="middle" font-size="12" fill="#555" font-family="Segoe UI">KUBERNETES</text>
      </g>
      <g class="node-6" transform="translate(-113, 113)">
        <circle r="22" fill="#E67E22"/><rect x="-10" y="-7" width="20" height="14" rx="2" fill="#FFF"/><path d="M-10 -7 L0 0 L10 -7" fill="none" stroke="#E67E22" stroke-width="2"/><text x="-28" y="25" text-anchor="end" font-size="12" fill="#555" font-family="Segoe UI">EMAIL</text>
      </g>
      <g class="node-7" transform="translate(-160, 0)">
        <circle r="22" fill="#2C3E50"/><text y="5" text-anchor="middle" font-size="14" fill="#FFF" class="text-bold" font-family="monospace">&gt;_</text><text x="-28" y="5" text-anchor="end" font-size="12" fill="#555" font-family="Segoe UI">SHELL</text>
      </g>
      <g class="node-8" transform="translate(-113, -113)">
        <circle r="22" fill="#E74C3C"/><rect x="-11" y="-7" width="22" height="14" rx="2" fill="#FFF"/><rect x="-11" y="-3" width="22" height="3" fill="#E74C3C"/><text x="-28" y="-15" text-anchor="end" font-size="12" fill="#555" font-family="Segoe UI">PAYMENT</text>
      </g>

      <!-- Central Hub Circle -->
      <circle class="hub-circle" r="55" fill="#2C3E50"/>
      <text y="8" text-anchor="middle" font-size="20" fill="#FFFFFF" font-weight="bold" font-family="Segoe UI">AGENT</text>
    </g>

    <!-- UI Elements -->
    <g class="right-ui">
      <rect x="1140" y="550" width="140" height="44" rx="22" fill="#27AE60"/>
      <text x="1210" y="578" text-anchor="middle" font-size="16" fill="#FFFFFF" class="text-bold" font-family="Segoe UI">INSTALL</text>
      
      <g transform="translate(920, 650)">
        <text x="0" y="30" font-size="14" fill="#95A5A6" class="text-caps" font-family="Segoe UI">Capability</text>
        <text x="150" y="30" font-size="16" fill="#E74C3C" font-family="Segoe UI" class="text-bold">Everything</text>
        
        <text x="0" y="70" font-size="14" fill="#95A5A6" class="text-caps" font-family="Segoe UI">Access</text>
        <text x="150" y="70" font-size="16" fill="#E74C3C" font-family="Segoe UI" class="text-bold">Full System/Network</text>
        
        <text x="0" y="110" font-size="14" fill="#95A5A6" class="text-caps" font-family="Segoe UI">Worst Case</text>
        <text x="150" y="110" font-size="15" fill="#E74C3C" font-family="Segoe UI" class="text-bold">Data Breach, Exfiltration, Supply Chain Attack</text>
      </g>
    </g>
  </g>
</svg>