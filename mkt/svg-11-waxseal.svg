<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 418" width="800" height="418">
    <defs>
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#3a2f22" stroke-width="0.5" opacity="0.08"/>
        </pattern>
        <radialGradient id="wax-grad" cx="40%" cy="40%" r="60%">
            <stop offset="0%" stop-color="#d63b3b" />
            <stop offset="70%" stop-color="#9e1b1b" />
            <stop offset="100%" stop-color="#540707" />
        </radialGradient>
        <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
        </filter>
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur1" />
            <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur2" />
            <feMerge>
                <feMergeNode in="blur1"/>
                <feMergeNode in="blur2"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <clipPath id="scroll-clip">
            <rect x="250" y="70" width="300" height="240" class="scroll-mask" transform-origin="400px 70px" />
        </clipPath>
        <g id="full-seal">
            <path d="M400,210 C418,208 430,215 433,228 C438,242 428,260 415,266 C398,272 380,268 368,255 C358,240 368,218 382,212 C388,209 394,211 400,210 Z" fill="url(#wax-grad)"/>
            <path d="M400,210 C418,208 430,215 433,228 C438,242 428,260 415,266 C398,272 380,268 368,255 C358,240 368,218 382,212 C388,209 394,211 400,210 Z" fill="none" stroke="#600f0f" stroke-width="1.5"/>
            <circle cx="400" cy="238" r="18" fill="none" stroke="#7a1212" stroke-width="2"/>
            <circle cx="400" cy="238" r="16" fill="#8a1818" />
            <text x="400" y="244" font-family="serif" font-size="16" fill="#f4dca6" font-weight="bold" text-anchor="middle">A</text>
            <path id="text-arc" d="M 386,238 A 14,14 0 0,1 414,238" fill="none" />
            <text font-family="monospace" font-size="4.5" fill="#f4dca6" font-weight="bold" letter-spacing="1.2">
                <textPath href="#text-arc" startOffset="50%" text-anchor="middle">acme.com</textPath>
            </text>
        </g>
        <clipPath id="clip-quad1">
            <polygon points="350,180 405,180 398,205 402,235 380,230 350,245" />
        </clipPath>
        <clipPath id="clip-quad2">
            <polygon points="405,180 450,180 450,230 420,242 402,235 398,205" />
        </clipPath>
        <clipPath id="clip-quad3">
            <polygon points="450,230 450,300 400,300 395,260 402,235 420,242" />
        </clipPath>
        <clipPath id="clip-quad4">
            <polygon points="350,245 380,230 402,235 395,260 400,300 350,300" />
        </clipPath>
    </defs>

    <style>
        .scroll-mask { animation: unroll 12s infinite cubic-bezier(0.4, 0, 0.2, 1); }
        .scroll-bottom { animation: roll-down 12s infinite cubic-bezier(0.4, 0, 0.2, 1); }
        .stamper1 { animation: stamp1 12s infinite cubic-bezier(0.4, 0, 0.2, 1); }
        .intact-seal-anim { animation: seal-appear 12s infinite; }
        .glow-anim { animation: seal-glow-anim 12s infinite; transform-origin: 400px 238px; }
        .stamper2 { animation: stamp2 12s infinite cubic-bezier(0.4, 0, 0.2, 1); }
        .broken-seal-vis { animation: broken-seal-vis 12s infinite; }
        .crumble1 { animation: crumble1 12s infinite; transform-origin: 375px 200px; }
        .crumble2 { animation: crumble2 12s infinite; transform-origin: 430px 205px; }
        .crumble3 { animation: crumble3 12s infinite; transform-origin: 430px 270px; }
        .crumble4 { animation: crumble4 12s infinite; transform-origin: 375px 270px; }
        .msg-anim { animation: msg-anim 12s infinite cubic-bezier(0.4, 0, 0.2, 1); transform-origin: 400px 360px; }

        @keyframes unroll {
            0%, 5% { transform: scaleY(0); }
            12%, 92% { transform: scaleY(1); }
            97%, 100% { transform: scaleY(0); }
        }
        @keyframes roll-down {
            0%, 5% { transform: translateY(-220px); }
            12%, 92% { transform: translateY(0); }
            97%, 100% { transform: translateY(-220px); }
        }
        @keyframes stamp1 {
            0%, 12% { transform: translateY(-150px); opacity: 0; }
            15% { transform: translateY(-75px); opacity: 1; }
            18%, 22% { transform: translateY(0); opacity: 1; }
            26%, 100% { transform: translateY(-150px); opacity: 0; }
        }
        @keyframes seal-appear {
            0%, 18% { opacity: 0; }
            18.1%, 49.9% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }
        @keyframes seal-glow-anim {
            0%, 18% { opacity: 0; transform: scale(0.8); }
            20% { opacity: 0.8; transform: scale(1.1); }
            25%, 45% { opacity: 0.25; transform: scale(1); }
            50%, 100% { opacity: 0; }
        }
        @keyframes stamp2 {
            0%, 42% { transform: translate(150px, -150px) rotate(-20deg); opacity: 0; }
            45% { transform: translate(75px, -75px) rotate(-10deg); opacity: 1; }
            50%, 52% { transform: translate(0px, 0px) rotate(0deg); opacity: 1; }
            58%, 100% { transform: translate(150px, -150px) rotate(20deg); opacity: 0; }
        }
        @keyframes broken-seal-vis {
            0%, 49.9% { opacity: 0; }
            50%, 85% { opacity: 1; }
            85.1%, 100% { opacity: 0; }
        }
        @keyframes crumble1 {
            0%, 50% { transform: translate(0, 0) rotate(0); opacity: 1; }
            53% { transform: translate(-15px, -10px) rotate(-15deg); opacity: 1; }
            65%, 85% { transform: translate(-30px, 10px) rotate(-35deg); opacity: 0; }
            85.1%, 100% { opacity: 0; }
        }
        @keyframes crumble2 {
            0%, 50% { transform: translate(0, 0) rotate(0); opacity: 1; }
            53% { transform: translate(15px, -15px) rotate(25deg); opacity: 1; }
            65%, 85% { transform: translate(35px, 5px) rotate(50deg); opacity: 0; }
            85.1%, 100% { opacity: 0; }
        }
        @keyframes crumble3 {
            0%, 50% { transform: translate(0, 0) rotate(0); opacity: 1; }
            53% { transform: translate(20px, 15px) rotate(15deg); opacity: 1; }
            65%, 85% { transform: translate(45px, 40px) rotate(35deg); opacity: 0; }
            85.1%, 100% { opacity: 0; }
        }
        @keyframes crumble4 {
            0%, 50% { transform: translate(0, 0) rotate(0); opacity: 1; }
            53% { transform: translate(-15px, 20px) rotate(-20deg); opacity: 1; }
            65%, 85% { transform: translate(-35px, 50px) rotate(-45deg); opacity: 0; }
            85.1%, 100% { opacity: 0; }
        }
        @keyframes msg-anim {
            0%, 54% { opacity: 0; transform: translateY(15px); }
            58%, 88% { opacity: 1; transform: translateY(0); }
            92%, 100% { opacity: 0; transform: translateY(-10px); }
        }
    </style>

    <rect width="100%" height="100%" fill="#f0e6d0"/>
    <rect width="100%" height="100%" fill="url(#grid)"/>

    <g stroke="#3a2f22" opacity="0.15" fill="none">
        <circle cx="400" cy="209" r="160" stroke-width="1" />
        <circle cx="400" cy="209" r="180" stroke-width="0.5" stroke-dasharray="4 4"/>
        <path d="M 20,209 Q 400,100 780,209" stroke-dasharray="8 4" stroke-width="0.75"/>
        <path d="M 20,209 Q 400,318 780,209" stroke-dasharray="8 4" stroke-width="0.75"/>
    </g>

    <g stroke="#3a2f22" stroke-width="0.75" fill="none" opacity="0.2">
        <path d="M 80,80 L 130,110 L 110,160 L 160,200 L 140,260" />
        <circle cx="80" cy="80" r="2" fill="#3a2f22"/>
        <circle cx="130" cy="110" r="3" fill="#3a2f22"/>
        <circle cx="110" cy="160" r="2" fill="#3a2f22"/>
        <circle cx="160" cy="200" r="4" fill="#3a2f22"/>
        <circle cx="140" cy="260" r="2" fill="#3a2f22"/>
        
        <path d="M 720,100 L 670,140 L 690,190 L 640,250" />
        <circle cx="720" cy="100" r="3" fill="#3a2f22"/>
        <circle cx="670" cy="140" r="2" fill="#3a2f22"/>
        <circle cx="690" cy="190" r="4" fill="#3a2f22"/>
        <circle cx="640" cy="250" r="2" fill="#3a2f22"/>
    </g>

    <g transform="translate(400, 209) scale(0.7)" opacity="0.08" stroke="#3a2f22" stroke-width="1" fill="none">
        <circle cx="0" cy="0" r="150" />
        <circle cx="0" cy="0" r="140" />
        <path d="M0,-180 L15,-40 L180,0 L15,40 L0,180 L-15,40 L-180,0 L-15,-40 Z" fill="#3a2f22"/>
        <path d="M0,-180 L0,180 M-180,0 L180,0 M-120,-120 L120,120 M-120,120 L120,-120" stroke-width="1.5"/>
    </g>

    <text x="100" y="50" font-family="serif" font-style="italic" font-size="12" fill="#3a2f22" opacity="0.3">Draco</text>
    <text x="680" y="80" font-family="serif" font-style="italic" font-size="12" fill="#3a2f22" opacity="0.3">Pegasus</text>
    <text x="400" y="40" font-family="serif" font-size="10" fill="#3a2f22" opacity="0.4" letter-spacing="2" text-anchor="middle">CIRCULUS AEQUINOCTIALIS</text>

    <g clip-path="url(#scroll-clip)">
        <rect x="260" y="70" width="280" height="235" fill="#fdfbf2" stroke="#4a3b2a" stroke-width="1.5" />
        <text x="400" y="115" font-family="serif" font-weight="bold" font-size="22" fill="#2d2419" text-anchor="middle" letter-spacing="1">SKILL.md</text>
        <line x1="300" y1="130" x2="500" y2="130" stroke="#4a3b2a" stroke-width="1" opacity="0.3"/>
        
        <g fill="#2d2419" font-family="monospace" font-size="12" opacity="0.85">
            <text x="290" y="155"># Provenance_Record</text>
            <text x="290" y="175">- domain   : acme.com</text>
            <text x="290" y="195">- status   : verified</text>
            <text x="290" y="215">- authority: Domain_Auth</text>
            <text x="290" y="235">- signature: valid</text>
        </g>
    </g>

    <g id="top-roller">
        <rect x="250" y="65" width="300" height="15" rx="7.5" fill="#e8dac1" stroke="#3a2f22" stroke-width="1.5"/>
        <line x1="260" y1="70" x2="540" y2="70" stroke="#fff" stroke-opacity="0.5" stroke-width="1"/>
        <line x1="260" y1="76" x2="540" y2="76" stroke="#bda886" stroke-width="1"/>
    </g>

    <g class="scroll-bottom">
        <rect x="250" y="285" width="300" height="15" rx="7.5" fill="#e8dac1" stroke="#3a2f22" stroke-width="1.5"/>
        <line x1="260" y1="290" x2="540" y2="290" stroke="#fff" stroke-opacity="0.5" stroke-width="1"/>
        <line x1="260" y1="296" x2="540" y2="296" stroke="#bda886" stroke-width="1"/>
    </g>

    <circle cx="400" cy="238" r="26" fill="none" stroke="#e6c253" stroke-width="5" class="glow-anim" filter="url(#glow)"/>

    <g class="intact-seal-anim" filter="url(#drop-shadow)">
        <use href="#full-seal"/>
    </g>

    <g class="broken-seal-vis" filter="url(#drop-shadow)">
        <g class="crumble1" clip-path="url(#clip-quad1)"><use href="#full-seal"/></g>
        <g class="crumble2" clip-path="url(#clip-quad2)"><use href="#full-seal"/></g>
        <g class="crumble3" clip-path="url(#clip-quad3)"><use href="#full-seal"/></g>
        <g class="crumble4" clip-path="url(#clip-quad4)"><use href="#full-seal"/></g>
    </g>

    <g class="stamper1">
        <path d="M 390,140 C 390,90 410,90 410,140 C 410,170 405,215 405,215 L 395,215 Z" fill="#6b4c3a" stroke="#3a2f22" stroke-width="1.5"/>
        <polygon points="380,215 420,215 425,233 375,233" fill="#d4af37" stroke="#3a2f22" stroke-width="1.5"/>
        <rect x="375" y="233" width="50" height="5" fill="#a98b2c" stroke="#3a2f22" stroke-width="1.5"/>
    </g>

    <g class="stamper2">
        <path d="M 405,225 L 440,140 L 460,150 L 425,235 Z" fill="#1c1c1c" stroke="#111" stroke-width="1.5"/>
        <polygon points="380,225 425,225 430,238 385,238" fill="#3a3a3a" stroke="#111" stroke-width="1.5"/>
        <polygon points="385,238 430,238 428,242 383,242" fill="#222" stroke="#111" stroke-width="1.5"/>
        <path d="M 400,230 L 410,236 M 410,230 L 400,236" stroke="#cc3333" stroke-width="1.5"/>
    </g>

    <text class="msg-anim" x="400" y="360" font-family="serif" font-size="22" font-style="italic" fill="#2d2419" text-anchor="middle" letter-spacing="0.5">
        You can't forge the origin.
    </text>

    <rect x="15" y="15" width="770" height="388" fill="none" stroke="#3a2f22" stroke-width="2" opacity="0.6"/>
    <rect x="20" y="20" width="760" height="378" fill="none" stroke="#3a2f22" stroke-width="0.5" opacity="0.6"/>
    
    <circle cx="20" cy="20" r="40" fill="none" stroke="#3a2f22" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.5"/>
    <circle cx="780" cy="20" r="40" fill="none" stroke="#3a2f22" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.5"/>
    <circle cx="20" cy="398" r="40" fill="none" stroke="#3a2f22" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.5"/>
    <circle cx="780" cy="398" r="40" fill="none" stroke="#3a2f22" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.5"/>
</svg>