<svg viewBox="0 0 800 418" width="800" height="418" xmlns="http://www.w3.org/2000/svg">
<defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
        </feMerge>
    </filter>
    <filter id="glow-heavy" x="-30%" y="-30%" width="160%" height="160%">
        <feGaussianBlur stdDeviation="5" result="blur"/>
        <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
        </feMerge>
    </filter>
    <linearGradient id="sky-grad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#0f172a" />
        <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
</defs>

<style>
    /* Base Styles */
    .bg { fill: #0f172a; }
    .sky { fill: url(#sky-grad); }
    .wire { stroke: #0d9488; stroke-width: 1.5; fill: none; filter: url(#glow); stroke-linecap: round; stroke-linejoin: round; }
    .wire-thin { stroke: #0d9488; stroke-width: 0.5; fill: none; opacity: 0.5; }
    .dot { fill: #2dd4bf; filter: url(#glow); }
    .text { font-family: monospace; font-weight: bold; fill: #2dd4bf; filter: url(#glow); letter-spacing: 1px; }
    
    /* Shield Sign Animation */
    .shield-group {
        animation: shield-pulse 4s infinite alternate ease-in-out;
    }
    @keyframes shield-pulse {
        0% { opacity: 0.6; transform: translate(80px, 320px) scale(0.98); }
        100% { opacity: 1; transform: translate(80px, 320px) scale(1.02); }
    }
    .shield-wire { stroke: #2dd4bf; stroke-width: 2; fill: rgba(13, 148, 136, 0.1); filter: url(#glow-heavy); }

    /* House 1 (Mismatch - Red) */
    .h1-wire { animation: pulse-red 10s infinite; stroke-linecap: round; stroke-linejoin: round; fill: none; stroke-width: 1.5; filter: url(#glow); }
    .h1-door { animation: door-red 10s infinite; stroke-width: 1.5; filter: url(#glow); }
    .h1-node { animation: dot-red 10s infinite; filter: url(#glow); }
    .h1-text { animation: text-red 10s infinite; }

    @keyframes pulse-red {
        0%, 38%, 46%, 100% { stroke: #0d9488; }
        39%, 45% { stroke: #ef4444; }
    }
    @keyframes door-red {
        0%, 38%, 46%, 100% { fill: transparent; stroke: #0d9488; }
        39%, 45% { fill: rgba(239, 68, 68, 0.2); stroke: #ef4444; }
    }
    @keyframes dot-red {
        0%, 38%, 46%, 100% { fill: #2dd4bf; }
        39%, 45% { fill: #f87171; }
    }
    @keyframes text-red {
        0%, 38%, 46%, 100% { fill: #2dd4bf; }
        39%, 45% { fill: #ef4444; }
    }

    /* House 2 (Match - Green) */
    .h2-wire { animation: pulse-green 10s infinite; stroke-linecap: round; stroke-linejoin: round; fill: none; stroke-width: 1.5; filter: url(#glow); }
    .h2-door { animation: door-green 10s infinite; stroke-width: 1.5; filter: url(#glow); }
    .h2-node { animation: dot-green 10s infinite; filter: url(#glow); }
    .h2-text { animation: text-green 10s infinite; }

    @keyframes pulse-green {
        0%, 68%, 86%, 100% { stroke: #0d9488; }
        69%, 85% { stroke: #10b981; }
    }
    @keyframes door-green {
        0%, 68%, 86%, 100% { fill: transparent; stroke: #0d9488; }
        69%, 85% { fill: rgba(16, 185, 129, 0.2); stroke: #10b981; }
    }
    @keyframes dot-green {
        0%, 68%, 86%, 100% { fill: #2dd4bf; }
        69%, 85% { fill: #34d399; }
    }
    @keyframes text-green {
        0%, 68%, 86%, 100% { fill: #2dd4bf; }
        69%, 85% { fill: #10b981; }
    }

    /* Check Beams */
    .beam-red {
        fill: none; stroke-width: 2; stroke-dasharray: 4 4; filter: url(#glow);
        animation: beam-r 10s infinite;
    }
    @keyframes beam-r {
        0%, 39%, 46%, 100% { opacity: 0; stroke: #ef4444; }
        40%, 45% { opacity: 1; stroke: #ef4444; stroke-dashoffset: -20; }
    }

    .beam-green {
        fill: none; stroke-width: 2; stroke-dasharray: 4 4; filter: url(#glow);
        animation: beam-g 10s infinite;
    }
    @keyframes beam-g {
        0%, 69%, 86%, 100% { opacity: 0; stroke: #10b981; }
        70%, 85% { opacity: 1; stroke: #10b981; stroke-dashoffset: -20; }
    }

    /* Packages */
    .pkg-shape { fill: rgba(15, 23, 42, 0.8); stroke-width: 1.5; stroke-linejoin: round; }
    .pkg1 { animation: p1-move 10s infinite linear; filter: url(#glow); }
    .pkg1 .pkg-shape { animation: p1-color 10s infinite; }
    .pkg1 .pkg-txt { animation: p1-txt 10s infinite; font-family: monospace; font-size: 6px; text-anchor: middle; font-weight: bold; }
    
    @keyframes p1-move {
        0% { transform: translate(100px, 450px) scale(1.2); opacity: 0; }
        5% { opacity: 1; }
        40% { transform: translate(265px, 290px) scale(0.6); }
        41% { transform: translate(260px, 290px) scale(0.6) rotate(-10deg); }
        60% { transform: translate(50px, 150px) scale(0.3) rotate(-90deg); opacity: 1; }
        65%, 100% { transform: translate(0px, 100px) scale(0.1) rotate(-120deg); opacity: 0; }
    }
    @keyframes p1-color {
        0%, 40% { stroke: #0d9488; }
        41%, 100% { stroke: #ef4444; }
    }
    @keyframes p1-txt {
        0%, 40% { fill: #2dd4bf; }
        41%, 100% { fill: #f87171; }
    }

    .pkg2 { animation: p2-move 10s infinite linear; filter: url(#glow); }
    .pkg2 .pkg-shape { animation: p2-color 10s infinite; }
    .pkg2 .pkg-txt { animation: p2-txt 10s infinite; font-family: monospace; font-size: 6px; text-anchor: middle; font-weight: bold; }

    @keyframes p2-move {
        0%, 30% { transform: translate(700px, 450px) scale(1.2); opacity: 0; }
        35% { opacity: 1; }
        70% { transform: translate(482px, 240px) scale(0.45); }
        85% { transform: translate(660px, 230px) scale(0.25); opacity: 1; }
        88%, 100% { transform: translate(660px, 230px) scale(0.1); opacity: 0; }
    }
    @keyframes p2-color {
        0%, 70% { stroke: #0d9488; }
        71%, 100% { stroke: #10b981; }
    }
    @keyframes p2-txt {
        0%, 70% { fill: #2dd4bf; }
        71%, 100% { fill: #34d399; }
    }

    /* Particles */
    .particle { fill: #2dd4bf; opacity: 0; animation: floatUp 5s infinite linear; filter: url(#glow); }
    .p1 { animation-delay: 0s; } .p2 { animation-delay: 1.5s; } .p3 { animation-delay: 3s; }
    @keyframes floatUp {
        0% { transform: translateY(0px) scale(1); opacity: 0; }
        20% { opacity: 0.8; }
        80% { opacity: 0.8; }
        100% { transform: translateY(-80px) scale(0.3); opacity: 0; }
    }
</style>

<!-- Background -->
<rect width="800" height="418" class="bg" />
<rect width="800" height="160" class="sky" />

<!-- Digital Sun & Skyline -->
<path d="M 360 160 A 40 40 0 0 1 440 160 M 340 160 A 60 60 0 0 1 460 160 M 320 160 A 80 80 0 0 1 480 160" class="wire-thin" stroke-dasharray="8 8" />
<path d="M 0 160 L 0 130 L 30 130 L 50 90 L 80 90 L 100 140 L 150 120 L 180 140 L 220 80 L 250 80 L 280 140 L 320 110 L 350 150 L 400 160 L 450 140 L 480 90 L 520 110 L 550 150 L 580 100 L 620 100 L 650 130 L 700 80 L 730 80 L 760 140 L 800 120 L 800 160 Z" class="wire-thin" fill="rgba(15, 23, 42, 0.5)" />

<!-- Floor Perspective Grid -->
<g class="wire-thin">
    <!-- Horizon -->
    <line x1="0" y1="160" x2="800" y2="160" stroke="#2dd4bf" stroke-width="1" filter="url(#glow)"/>
    
    <!-- Radiating Lines (VP: 400, 160) -->
    <line x1="400" y1="160" x2="0" y2="418" />
    <line x1="400" y1="160" x2="100" y2="418" /> <!-- Left Lane Center -->
    <line x1="400" y1="160" x2="200" y2="418" /> <!-- Inner Left -->
    <line x1="400" y1="160" x2="300" y2="418" />
    <line x1="400" y1="160" x2="400" y2="418" class="wire" stroke-dasharray="10 10" /> <!-- Street Center -->
    <line x1="400" y1="160" x2="500" y2="418" />
    <line x1="400" y1="160" x2="600" y2="418" /> <!-- Inner Right -->
    <line x1="400" y1="160" x2="700" y2="418" /> <!-- Right Lane Center -->
    <line x1="400" y1="160" x2="800" y2="418" />
    
    <!-- Horizontal Depth Lines -->
    <line x1="0" y1="170" x2="800" y2="170" />
    <line x1="0" y1="185" x2="800" y2="185" />
    <line x1="0" y1="205" x2="800" y2="205" />
    <line x1="0" y1="235" x2="800" y2="235" />
    <line x1="0" y1="280" x2="800" y2="280" />
    <line x1="0" y1="345" x2="800" y2="345" />
</g>

<!-- HOUSE 1 (Mismatch - Left) -->
<g class="house1">
    <text x="170" y="130" class="text h1-text" text-anchor="middle" font-size="10">DOM-1</text>
    
    <!-- Faces & Edges -->
    <path class="h1-wire" d="M 120 290 L 220 290 L 220 210 L 120 210 Z" />
    <path class="h1-wire" d="M 260 225 L 310 225 L 310 185 L 260 185 Z" />
    <path class="h1-wire" d="M 120 290 L 260 225 M 220 290 L 310 225 M 220 210 L 310 185 M 120 210 L 260 185" />
    <path class="h1-wire" d="M 120 210 L 170 150 L 220 210 M 260 185 L 285 155 L 310 185 M 170 150 L 285 155" />
    
    <!-- Door -->
    <polygon points="155,290 155,250 185,250 185,290" class="h1-door" />
    
    <!-- Vertices -->
    <circle cx="120" cy="290" r="2.5" class="h1-node"/>
    <circle cx="220" cy="290" r="2.5" class="h1-node"/>
    <circle cx="220" cy="210" r="2.5" class="h1-node"/>
    <circle cx="120" cy="210" r="2.5" class="h1-node"/>
    <circle cx="260" cy="225" r="2.5" class="h1-node"/>
    <circle cx="310" cy="225" r="2.5" class="h1-node"/>
    <circle cx="310" cy="185" r="2.5" class="h1-node"/>
    <circle cx="260" cy="185" r="2.5" class="h1-node"/>
    <circle cx="170" cy="150" r="2.5" class="h1-node"/>
    <circle cx="285" cy="155" r="2.5" class="h1-node"/>
    <circle cx="155" cy="250" r="2" class="h1-node"/>
    <circle cx="185" cy="250" r="2" class="h1-node"/>
</g>

<!-- HOUSE 2 (Match - Right) -->
<g class="house2">
    <text x="660" y="135" class="text h2-text" text-anchor="middle" font-size="10">DOM-2</text>
    
    <!-- Faces & Edges -->
    <path class="h2-wire" d="M 620 240 L 700 240 L 700 190 L 620 190 Z" />
    <path class="h2-wire" d="M 510 200 L 550 200 L 550 175 L 510 175 Z" />
    <path class="h2-wire" d="M 620 240 L 510 200 M 700 240 L 550 200 M 700 190 L 550 175 M 620 190 L 510 175" />
    <path class="h2-wire" d="M 620 190 L 660 150 L 700 190 M 510 175 L 530 155 L 550 175 M 660 150 L 530 155" />
    
    <!-- Door -->
    <polygon points="650,240 650,215 670,215 670,240" class="h2-door" />
    
    <!-- Vertices -->
    <circle cx="620" cy="240" r="2" class="h2-node"/>
    <circle cx="700" cy="240" r="2" class="h2-node"/>
    <circle cx="700" cy="190" r="2" class="h2-node"/>
    <circle cx="620" cy="190" r="2" class="h2-node"/>
    <circle cx="510" cy="200" r="2" class="h2-node"/>
    <circle cx="550" cy="200" r="2" class="h2-node"/>
    <circle cx="550" cy="175" r="2" class="h2-node"/>
    <circle cx="510" cy="175" r="2" class="h2-node"/>
    <circle cx="660" cy="150" r="2" class="h2-node"/>
    <circle cx="530" cy="155" r="2" class="h2-node"/>
    <circle cx="650" cy="215" r="1.5" class="h2-node"/>
    <circle cx="670" cy="215" r="1.5" class="h2-node"/>
</g>

<!-- Data Check Beams -->
<line x1="170" y1="250" x2="265" y2="290" class="beam-red" />
<line x1="660" y1="215" x2="482" y2="240" class="beam-green" />

<!-- Packages -->
<g class="pkg1">
    <!-- Inner Box -->
    <path d="M -8 -8 L 8 -8 L 8 8 L -8 8 Z" class="pkg-shape" />
    <path d="M -2 -14 L 14 -14 L 14 2 L -2 2 Z" class="pkg-shape" />
    <path d="M -8 -8 L -2 -14 M 8 -8 L 14 -14 M 8 8 L 14 2 M -8 8 L -2 2" class="pkg-shape" />
    <!-- Label -->
    <text x="3" y="2" class="pkg-txt">LBL</text>
    <circle cx="-8" cy="-8" r="1.5" class="dot"/>
    <circle cx="8" cy="-8" r="1.5" class="dot"/>
    <circle cx="8" cy="8" r="1.5" class="dot"/>
    <circle cx="-8" cy="8" r="1.5" class="dot"/>
</g>

<g class="pkg2">
    <!-- Inner Box -->
    <path d="M -8 -8 L 8 -8 L 8 8 L -8 8 Z" class="pkg-shape" />
    <path d="M -2 -14 L 14 -14 L 14 2 L -2 2 Z" class="pkg-shape" />
    <path d="M -8 -8 L -2 -14 M 8 -8 L 14 -14 M 8 8 L 14 2 M -8 8 L -2 2" class="pkg-shape" />
    <!-- Label -->
    <text x="3" y="2" class="pkg-txt">LBL</text>
    <circle cx="-8" cy="-8" r="1.5" class="dot"/>
    <circle cx="8" cy="-8" r="1.5" class="dot"/>
    <circle cx="8" cy="8" r="1.5" class="dot"/>
    <circle cx="-8" cy="8" r="1.5" class="dot"/>
</g>

<!-- Foreground / Sign -->
<g class="shield-group">
    <!-- Outer Shield -->
    <path d="M -40 -30 L 40 -30 L 40 0 C 40 25 20 45 0 60 C -20 45 -40 25 -40 0 Z" class="shield-wire" />
    <!-- Inner Shield Line -->
    <path d="M -30 -20 L 30 -20 L 30 0 C 30 18 15 32 0 45 C -15 32 -30 18 -30 0 Z" class="wire" stroke="#2dd4bf" />
    
    <!-- Eye Motif inside shield -->
    <path d="M -15 12 Q 0 -3 15 12 Q 0 27 -15 12 Z" class="wire" stroke="#2dd4bf" />
    <circle cx="0" cy="12" r="3" class="dot" />
    
    <!-- Text -->
    <text x="0" y="-7" class="text" text-anchor="middle" font-size="8">NEIGHBORHOOD</text>
    <text x="0" y="3" class="text" text-anchor="middle" font-size="10">WATCH</text>
    
    <!-- Vertices -->
    <circle cx="-40" cy="-30" r="2.5" class="dot" />
    <circle cx="40" cy="-30" r="2.5" class="dot" />
    <circle cx="0" cy="60" r="2.5" class="dot" />
    <circle cx="-30" cy="-20" r="1.5" class="dot" />
    <circle cx="30" cy="-20" r="1.5" class="dot" />
    <circle cx="0" cy="45" r="1.5" class="dot" />
</g>

<!-- Floating Ambient Data Particles -->
<circle cx="150" cy="350" r="1.5" class="particle p1" />
<circle cx="650" cy="380" r="2" class="particle p2" />
<circle cx="350" cy="300" r="1" class="particle p3" />
<circle cx="200" cy="200" r="1.5" class="particle p2" />
<circle cx="550" cy="250" r="1" class="particle p1" />

</svg>